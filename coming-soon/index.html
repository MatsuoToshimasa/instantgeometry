<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>準備中 | Instant Geometry</title>
  <link rel="stylesheet" href="/assets/base.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:
        repeating-linear-gradient(135deg, rgba(42,91,215,.05) 0 12px, transparent 12px 30px),
        linear-gradient(180deg,#f8faff 0%,#f3f6fc 100%);
      color: #1f2430;
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid #d9dce7;
      border-radius: 24px;
      box-shadow: 0 10px 28px rgba(27,39,94,.08);
      padding: 34px 28px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid #cfdcff;
      background: #eef3ff;
      color: #1f3d94;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    h1 {
      margin: 14px 0 10px;
      font-size: clamp(28px, 3.5vw, 38px);
      line-height: 1.2;
    }
    p {
      margin: 0 auto;
      max-width: 560px;
      color: #687086;
      font-size: 15px;
      line-height: 1.8;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 152px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #cfd7ea;
      background: linear-gradient(180deg,#ffffff 0%,#f6f8ff 100%);
      color: #24304d;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .btn:hover {
      border-color: #9fb3ea;
      color: #1f3d94;
      background: linear-gradient(180deg,#ffffff 0%,#eef3ff 100%);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <span class="badge">COMING SOON</span>
      <h1 id="soonTitle">この機能は準備中です</h1>
      <p id="soonBody">現在、UIと内部ロジックを整備しています。公開までしばらくお待ちください。</p>
      <div class="actions">
        <a class="btn" href="/" id="homeBtn">トップへ戻る</a>
        <a class="btn" href="/draw/" id="drawBtn">図形を描くへ</a>
      </div>
    </section>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const feature = (params.get('feature') || '').toLowerCase();
      const title = document.getElementById('soonTitle');
      const body = document.getElementById('soonBody');
      if (!title || !body) return;
      if (feature === 'problems') {
        document.title = '問題を作る（準備中） | Instant Geometry';
        title.textContent = '問題を作る は準備中です';
        body.textContent = '問題生成の仕様と出力品質を調整中です。整い次第公開します。';
      } else if (feature === 'functions') {
        document.title = '関数を描く（準備中） | Instant Geometry';
        title.textContent = '関数を描く は準備中です';
        body.textContent = '関数グラフ機能は現在準備中です。先に図形描画をご利用ください。';
      } else if (feature === 'generator') {
        document.title = '問題ジェネレーター（準備中） | Instant Geometry';
        title.textContent = '問題ジェネレーターは準備中です';
        body.textContent = 'このURLは現在公開前です。公開までお待ちください。';
      }
    })();
  </script>
</body>
</html>
