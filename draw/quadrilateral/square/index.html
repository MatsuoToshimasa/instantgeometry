<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正方形 | Instant Geometry</title>
  <link rel="stylesheet" href="../../../assets/base.css" />
  <link rel="stylesheet" href="../../../assets/draw-simple-page.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="drawSimplePage"></div>
  <div id="site-footer"></div>
  <script>
    window.drawSimplePageConfig = {
      title: '正方形',
      lead: '三角形ページと同じ左右ドック設計で、正方形を1辺の長さから描画します。',
      leftTitle: '入力',
      leftIntro: '左上を A とし、反時計回りに A-B-C-D を配置します。',
      fieldsTitle: '指定条件',
      fields: [
        { label: '一辺', value: '5' }
      ],
      fieldsHint: '整数・小数・式を入力できます。',
      toggles: [
        { title: 'A', checked: true },
        { title: 'B', checked: true },
        { title: 'C', checked: true },
        { title: 'D', checked: true },
        { title: 'a', checked: true },
        { title: 'b', checked: true },
        { title: 'c', checked: true },
        { title: 'd', checked: true },
        { title: '∠A', checked: true },
        { title: '∠B', checked: true },
        { title: '∠C', checked: true },
        { title: '∠D', checked: true }
      ],
      specialTogglesTitle: '特別ラベル',
      specialToggles: [
        { title: 'O', checked: false },
        { title: 'AC', checked: false },
        { title: 'BD', checked: false },
        { title: '∠DAC', checked: false },
        { title: '∠BAC', checked: false },
        { title: '∠ABD', checked: false },
        { title: '∠CBD', checked: false },
        { title: '∠BCA', checked: false },
        { title: '∠DCA', checked: false },
        { title: '∠CDB', checked: false },
        { title: '∠ADB', checked: false },
        { title: '∠AOB', checked: false },
        { title: '∠BOC', checked: false },
        { title: '∠COD', checked: false },
        { title: '∠DOA', checked: false }
      ],
      badge: '一般ラベルと特別ラベルを右ドックで切り替えできます。',
      status: '正方形を描画しました。',
      notes: [
        { label: '図形種別', value: '正方形' },
        { label: '入力軸', value: '一辺の長さ' },
        { label: '状態', value: '作成中' }
      ],
      crumbs: [
        { label: 'トップ', href: '/' },
        { label: '図形を描く', href: '/draw/' },
        { label: '正方形' }
      ],
      previewSvg: ''
    };
  </script>
  <script>
    (function () {
      'use strict';
      const isFileProtocol = window.location.protocol === 'file:';
      const assetBase = '../../../assets';

      function loadScript(src) {
        return new Promise(function (resolve) {
          const script = document.createElement('script');
          script.src = src;
          script.onload = function () { resolve(true); };
          script.onerror = function () { resolve(false); };
          document.body.appendChild(script);
        });
      }

      (async function () {
        if (!isFileProtocol) {
          await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
          await loadScript(assetBase + '/supabase-client.js');
          await loadScript(assetBase + '/auth-ui.js');
          await loadScript(assetBase + '/components.js');
        }
        await loadScript(assetBase + '/draw-simple-page.js');

        function renderLocalSquareFallback() {
          const mount = document.getElementById('drawSimplePage');
          if (!mount) return;
          mount.innerHTML = '' +
            '<main style="min-height:100vh;background:#f4f6fb;padding:24px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,\\'Segoe UI\\',sans-serif;">' +
              '<div style="max-width:980px;margin:0 auto;background:#fff;border:1px solid #d7deef;border-radius:16px;padding:20px;">' +
                '<h1 style="margin:0 0 10px;font-size:28px;color:#1e2638;">正方形</h1>' +
                '<p style="margin:0 0 16px;color:#5b647a;">ローカル表示モードで描画しています。</p>' +
                '<label style="display:block;font-weight:600;color:#28314a;margin-bottom:8px;">一辺</label>' +
                '<input id="localSquareSide" type="text" value="5" style="width:220px;padding:10px 12px;border:1px solid #cfd7ea;border-radius:10px;font-size:16px;" />' +
                '<div id="localSquareError" style="margin-top:8px;color:#c13737;min-height:20px;font-size:14px;"></div>' +
                '<div style="margin-top:14px;border:1px solid #d7deef;border-radius:14px;background:#fafcff;padding:14px;">' +
                  '<svg id="localSquareSvg" viewBox="0 0 600 420" width="100%" height="420" aria-label="square preview"></svg>' +
                '</div>' +
              '</div>' +
            '</main>';

          const sideInput = document.getElementById('localSquareSide');
          const err = document.getElementById('localSquareError');
          const svg = document.getElementById('localSquareSvg');

          function draw() {
            const raw = (sideInput.value || '').trim();
            const v = Number(raw);
            if (!Number.isFinite(v) || v <= 0) {
              err.textContent = '0より大きい数値を入力してください。';
              return;
            }
            err.textContent = '';
            const size = Math.min(280, Math.max(40, v * 28));
            const cx = 300;
            const cy = 210;
            const h = size / 2;
            const A = [cx - h, cy - h];
            const B = [cx - h, cy + h];
            const C = [cx + h, cy + h];
            const D = [cx + h, cy - h];
            const pts = [A, B, C, D].map(function (p) { return p[0] + ',' + p[1]; }).join(' ');
            svg.innerHTML =
              '<rect x="0" y="0" width="600" height="420" fill="#f7f9ff"></rect>' +
              '<polygon points="' + pts + '" fill="rgba(42,91,215,.08)" stroke="#2a5bd7" stroke-width="3"></polygon>' +
              '<text x="' + (A[0] - 18) + '" y="' + (A[1] - 8) + '" font-size="26" fill="#1f2638" font-family="serif">A</text>' +
              '<text x="' + (B[0] - 18) + '" y="' + (B[1] + 26) + '" font-size="26" fill="#1f2638" font-family="serif">B</text>' +
              '<text x="' + (C[0] + 8) + '" y="' + (C[1] + 26) + '" font-size="26" fill="#1f2638" font-family="serif">C</text>' +
              '<text x="' + (D[0] + 8) + '" y="' + (D[1] - 8) + '" font-size="26" fill="#1f2638" font-family="serif">D</text>' +
              '<text x="' + cx + '" y="' + (cy + h + 34) + '" text-anchor="middle" font-size="30" fill="#2a5bd7" font-family="serif">' + raw + '</text>';
          }

          sideInput.addEventListener('input', draw);
          draw();
        }

        // file:// 直開き時に何らかの理由で描画できない場合のフォールバック
        window.setTimeout(function () {
          const mount = document.getElementById('drawSimplePage');
          if (mount && !mount.hasChildNodes()) {
            renderLocalSquareFallback();
          }
        }, 500);
      })();
    })();
  </script>
</body>
</html>
