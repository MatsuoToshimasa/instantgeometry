<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正方形 | Instant Geometry</title>
  <link rel="stylesheet" href="../../../assets/base.css" />
  <link rel="stylesheet" href="../../../assets/draw-simple-page.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="drawSimplePage"></div>
  <div id="site-footer"></div>
  <script>
    window.drawSimplePageConfig = {
      title: '正方形',
      lead: '三角形ページと同じ左右ドック設計で、正方形を1辺の長さから描画します。',
      leftTitle: '入力',
      leftIntro: '左上を A とし、反時計回りに A-B-C-D を配置します。',
      fieldsTitle: '指定条件',
      fields: [
        { label: '一辺', value: '5' }
      ],
      fieldsHint: '整数・小数・式を入力できます。',
      toggles: [
        { title: 'A', checked: true },
        { title: 'B', checked: true },
        { title: 'C', checked: true },
        { title: 'D', checked: true },
        { title: 'a', checked: true },
        { title: 'b', checked: true },
        { title: 'c', checked: true },
        { title: 'd', checked: true },
        { title: '∠A', checked: true },
        { title: '∠B', checked: true },
        { title: '∠C', checked: true },
        { title: '∠D', checked: true }
      ],
      specialTogglesTitle: '特別ラベル',
      specialToggles: [
        { title: 'O', checked: false },
        { title: 'AC', checked: false },
        { title: 'BD', checked: false },
        { title: '∠DAC', checked: false },
        { title: '∠BAC', checked: false },
        { title: '∠ABD', checked: false },
        { title: '∠CBD', checked: false },
        { title: '∠BCA', checked: false },
        { title: '∠DCA', checked: false },
        { title: '∠CDB', checked: false },
        { title: '∠ADB', checked: false },
        { title: '∠AOB', checked: false },
        { title: '∠BOC', checked: false },
        { title: '∠COD', checked: false },
        { title: '∠DOA', checked: false }
      ],
      badge: '一般ラベルと特別ラベルを右ドックで切り替えできます。',
      status: '正方形を描画しました。',
      notes: [
        { label: '図形種別', value: '正方形' },
        { label: '入力軸', value: '一辺の長さ' },
        { label: '状態', value: '作成中' }
      ],
      crumbs: [
        { label: 'トップ', href: '/' },
        { label: '図形を描く', href: '/draw/' },
        { label: '正方形' }
      ],
      previewSvg: ''
    };
  </script>
  <script>
    (function () {
      'use strict';
      const isFileProtocol = window.location.protocol === 'file:';
      const assetBase = '../../../assets';

      function loadScript(src) {
        return new Promise(function (resolve) {
          const script = document.createElement('script');
          script.src = src;
          script.onload = function () { resolve(true); };
          script.onerror = function () { resolve(false); };
          document.body.appendChild(script);
        });
      }

      (async function () {
        if (!isFileProtocol) {
          await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
          await loadScript(assetBase + '/supabase-client.js');
          await loadScript(assetBase + '/auth-ui.js');
          await loadScript(assetBase + '/components.js');
        }
        await loadScript(assetBase + '/draw-simple-page.js');

        // file:// 直開き時に何らかの理由で描画できない場合の最低限フォールバック
        window.setTimeout(function () {
          const mount = document.getElementById('drawSimplePage');
          if (mount && !mount.hasChildNodes()) {
            mount.innerHTML = '<main style="padding:24px;font-family:system-ui,sans-serif;"><h1 style="margin:0 0 12px;">正方形</h1><p style="margin:0;">ローカル読み込みに失敗しました。<br>ターミナルで <code>python3 -m http.server</code> を実行して、<code>http://localhost:8000/draw/quadrilateral/square/</code> で開いてください。</p></main>';
          }
        }, 500);
      })();
    })();
  </script>
</body>
</html>
