        const minRadius = useInnerSector ? 0.42 : 0.65;
        const maxRadius = useInnerSector ? 1.35 : 2.5;
        if (radius < minRadius || radius > maxRadius) return false;
        const pointAngle = Math.atan2(dy, dx);
        const angle1 = Math.atan2(firstPoint.y - vertex.y, firstPoint.x - vertex.x);
        const angle2 = Math.atan2(secondPoint.y - vertex.y, secondPoint.x - vertex.x);
        const direct = normalizeAngle(angle2 - angle1);
        const useDirect = direct <= Math.PI;
        const innerContains = useDirect ? isAngleBetween(pointAngle, angle1, angle2) : !isAngleBetween(pointAngle, angle2, angle1);
        return useInnerSector ? innerContains : !innerContains;
      }

      function getAngleDecorationGeometry(angleId, triangle) {
        if (angleId === 'A') return { vertex: triangle.A, p1: triangle.B, p2: triangle.C };
        if (angleId === 'B') return { vertex: triangle.B, p1: triangle.A, p2: triangle.C };
        if (angleId === 'C') return { vertex: triangle.C, p1: triangle.A, p2: triangle.B };
        if (angleId === 'CAH') return { vertex: triangle.A, p1: triangle.C, p2: triangle.H };
        if (angleId === 'CBH') return { vertex: triangle.B, p1: triangle.C, p2: triangle.H };
        if (angleId === 'ACH') return { vertex: triangle.C, p1: triangle.A, p2: triangle.H };
        if (angleId === 'BCH') return { vertex: triangle.C, p1: triangle.B, p2: triangle.H };
        if (angleId === 'CHA') return { vertex: triangle.H, p1: triangle.C, p2: triangle.A };
        if (angleId === 'CHB') return { vertex: triangle.H, p1: triangle.C, p2: triangle.B };
        return null;
      }

      function drawAngleDecoration(angleId, triangle) {
        const mode = Number.isFinite(angleMarkerMode[angleId]) ? angleMarkerMode[angleId] : 0;
        if (mode === 0) return;
        const geometry = getAngleDecorationGeometry(angleId, triangle);
        if (!geometry) return;

        const vertex = geometry.vertex;
        const p1 = geometry.p1;
        const p2 = geometry.p2;
        const dAB = Math.hypot(triangle.A.x - triangle.B.x, triangle.A.y - triangle.B.y);
        const dBC = Math.hypot(triangle.B.x - triangle.C.x, triangle.B.y - triangle.C.y);
        const dCA = Math.hypot(triangle.C.x - triangle.A.x, triangle.C.y - triangle.A.y);
        const baseRadius = Math.max(0.06, (dAB + dBC + dCA) / 30);
        const sizeScale = Math.max(0.35, Math.min(8, labelFontSize.angleMark[angleId] / 26));
        const radius = baseRadius * sizeScale;
        const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
        const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
        let delta = a2 - a1;
        while (delta <= -Math.PI) delta += Math.PI * 2;
        while (delta > Math.PI) delta -= Math.PI * 2;
        if (Math.abs(delta) < 1e-4) return;

        const start = {
          x: vertex.x + radius * Math.cos(a1),
          y: vertex.y + radius * Math.sin(a1)
        };
        const end = {
          x: vertex.x + radius * Math.cos(a1 + delta),
          y: vertex.y + radius * Math.sin(a1 + delta)
        };
        const style = getLabelStyle('angleMark', angleId);
        const color = style.color || '#687086';

        board.create('segment', [[vertex.x, vertex.y], [start.x, start.y]], {
          fixed: true,
          strokeWidth: 1.4,
          strokeColor: color,
          highlight: false
        });
        board.create('segment', [[vertex.x, vertex.y], [end.x, end.y]], {
          fixed: true,
          strokeWidth: 1.4,
          strokeColor: color,
          highlight: false
        });
        board.create('curve', [
          function (t) {
            const angle = a1 + delta * t;
            return vertex.x + radius * Math.cos(angle);
          },
          function (t) {
            const angle = a1 + delta * t;
            return vertex.y + radius * Math.sin(angle);
          },
          0,
          1
        ], {
          fixed: true,
          strokeWidth: 1.8,
          strokeColor: color,
          highlight: false
        });

        const midAngle = a1 + delta / 2;
        const symbolCenter = {
          x: vertex.x + radius * Math.cos(midAngle),
          y: vertex.y + radius * Math.sin(midAngle)
        };
        const towardCenter = {
          x: vertex.x - symbolCenter.x,
          y: vertex.y - symbolCenter.y
        };
        const towardLen = Math.hypot(towardCenter.x, towardCenter.y) || 1;
        const dir = { x: towardCenter.x / towardLen, y: towardCenter.y / towardLen };
        const normal = { x: -dir.y, y: dir.x };
        const symbolSize = Math.max(0.03, radius * 0.34);

        if (mode === 2) {
          const circleSize = symbolSize * 0.5;
          board.create('curve', [
            function (t) { return symbolCenter.x + circleSize * Math.cos(t); },
            function (t) { return symbolCenter.y + circleSize * Math.sin(t); },
            0,
            Math.PI * 2
          ], {
            fixed: true,
            strokeWidth: 1.6,
            strokeColor: color,
            highlight: false
          });
        } else if (mode === 3) {
          const barSize = symbolSize * 0.5;
          board.create('segment', [
            [symbolCenter.x - dir.x * barSize, symbolCenter.y - dir.y * barSize],
            [symbolCenter.x + dir.x * barSize, symbolCenter.y + dir.y * barSize]
          ], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
        } else if (mode === 4) {
          const barSize = symbolSize * 0.5;
          const sep = barSize * 0.46;
          board.create('segment', [
            [symbolCenter.x - dir.x * barSize + normal.x * sep, symbolCenter.y - dir.y * barSize + normal.y * sep],
            [symbolCenter.x + dir.x * barSize + normal.x * sep, symbolCenter.y + dir.y * barSize + normal.y * sep]
          ], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
          board.create('segment', [
            [symbolCenter.x - dir.x * barSize - normal.x * sep, symbolCenter.y - dir.y * barSize - normal.y * sep],
            [symbolCenter.x + dir.x * barSize - normal.x * sep, symbolCenter.y + dir.y * barSize - normal.y * sep]
          ], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
        } else if (mode === 5) {
          const crossSize = symbolSize * 0.5;
          board.create('segment', [
            [symbolCenter.x - dir.x * crossSize - normal.x * crossSize, symbolCenter.y - dir.y * crossSize - normal.y * crossSize],
            [symbolCenter.x + dir.x * crossSize + normal.x * crossSize, symbolCenter.y + dir.y * crossSize + normal.y * crossSize]
          ], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
          board.create('segment', [
            [symbolCenter.x - dir.x * crossSize + normal.x * crossSize, symbolCenter.y - dir.y * crossSize + normal.y * crossSize],
            [symbolCenter.x + dir.x * crossSize - normal.x * crossSize, symbolCenter.y + dir.y * crossSize - normal.y * crossSize]
          ], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
        } else if (mode === 6) {
          const triSize = symbolSize * 0.5;
          const tip = {
            x: symbolCenter.x - dir.x * triSize * 1.15,
            y: symbolCenter.y - dir.y * triSize * 1.15
          };
          const baseL = {
            x: symbolCenter.x + dir.x * triSize * 0.85 + normal.x * triSize * 0.9,
            y: symbolCenter.y + dir.y * triSize * 0.85 + normal.y * triSize * 0.9
          };
          const baseR = {
            x: symbolCenter.x + dir.x * triSize * 0.85 - normal.x * triSize * 0.9,
            y: symbolCenter.y + dir.y * triSize * 0.85 - normal.y * triSize * 0.9
          };
          board.create('segment', [[tip.x, tip.y], [baseL.x, baseL.y]], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
          board.create('segment', [[baseL.x, baseL.y], [baseR.x, baseR.y]], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
          board.create('segment', [[baseR.x, baseR.y], [tip.x, tip.y]], {
            fixed: true,
            strokeWidth: 1.8,
            strokeColor: color,
            highlight: false
          });
        } else if (mode === 7) {
          const sectorPoints = [{ x: vertex.x, y: vertex.y }];
          const steps = 18;
          for (let i = 0; i <= steps; i += 1) {
            const t = i / steps;
            const angle = a1 + delta * t;
            sectorPoints.push({
              x: vertex.x + radius * Math.cos(angle),
              y: vertex.y + radius * Math.sin(angle)
            });
          }
          board.create('polygon', sectorPoints.map(function (p) { return [p.x, p.y]; }), {
            fixed: true,
            borders: {
              visible: false,
              highlight: false
            },
            vertices: {
              visible: false
            },
            fillColor: color,
            fillOpacity: 1,
            highlight: false
          });
        }

        const sampleAngles = [0, 0.25, 0.5, 0.75, 1].map(function (t) {
          const angle = a1 + delta * t;
          return {
            x: vertex.x + radius * Math.cos(angle),
            y: vertex.y + radius * Math.sin(angle)
          };
        });
        const boundsPoints = sampleAngles.concat(
          mode === 7
            ? [{ x: vertex.x, y: vertex.y }]
            : [
              { x: symbolCenter.x + normal.x * symbolSize, y: symbolCenter.y + normal.y * symbolSize },
              { x: symbolCenter.x - normal.x * symbolSize, y: symbolCenter.y - normal.y * symbolSize },
              { x: symbolCenter.x + dir.x * symbolSize, y: symbolCenter.y + dir.y * symbolSize },
              { x: symbolCenter.x - dir.x * symbolSize, y: symbolCenter.y - dir.y * symbolSize }
            ]
        );
        const screenPoints = boundsPoints.map(userToScreenPoint);
        const xs = screenPoints.map(function (pt) { return pt.x; });
        const ys = screenPoints.map(function (pt) { return pt.y; });
        currentLabelAnchors.push({
          type: 'angleMark',
          id: angleId,
          x: symbolCenter.x,
          y: symbolCenter.y,
          scaleCenter: { x: vertex.x, y: vertex.y },
          threshold: 0.52,
          curveThreshold: null,
          curveHit: null,
          visible: true,
          hidden: false,
          text: mode === 1 ? '' : mode === 2 ? '○' : mode === 3 ? '|' : mode === 4 ? '=' : mode === 5 ? '×' : mode === 6 ? '△' : '塗',
          fontSize: labelFontSize.angleMark[angleId],
          color: color,
          rotation: 0,
          screenRect: {
            left: Math.min.apply(null, xs),
            top: Math.min.apply(null, ys),
            right: Math.max.apply(null, xs),
            bottom: Math.max.apply(null, ys)
          }
        });
      }

      function getAngleLabelPosition(vertex, firstPoint, secondPoint, isExterior, distance) {
        const u1 = {
          x: firstPoint.x - vertex.x,
          y: firstPoint.y - vertex.y
        };
        const u2 = {
          x: secondPoint.x - vertex.x,
          y: secondPoint.y - vertex.y
        };
        const len1 = Math.hypot(u1.x, u1.y) || 1;
        const len2 = Math.hypot(u2.x, u2.y) || 1;
        const n1 = { x: u1.x / len1, y: u1.y / len1 };
        const n2 = { x: u2.x / len2, y: u2.y / len2 };
        let dir = { x: n1.x + n2.x, y: n1.y + n2.y };
        const dirLen = Math.hypot(dir.x, dir.y) || 1;
        dir = { x: dir.x / dirLen, y: dir.y / dirLen };
        if (isExterior) {
          dir.x *= -1;
          dir.y *= -1;
        }
        return { x: vertex.x + dir.x * distance, y: vertex.y + dir.y * distance };
      }

      function getBisectorDirection(vertex, firstPoint, secondPoint) {
        const u1 = {
          x: firstPoint.x - vertex.x,
          y: firstPoint.y - vertex.y
        };
        const u2 = {
          x: secondPoint.x - vertex.x,
          y: secondPoint.y - vertex.y
        };
        const len1 = Math.hypot(u1.x, u1.y) || 1;
        const len2 = Math.hypot(u2.x, u2.y) || 1;
        let dir = {
          x: (u1.x / len1) + (u2.x / len2),
          y: (u1.y / len1) + (u2.y / len2)
        };
        const dirLen = Math.hypot(dir.x, dir.y);
        if (dirLen < 1e-6) {
          dir = { x: u1.y / len1, y: -(u1.x / len1) };
        } else {
          dir.x /= dirLen;
          dir.y /= dirLen;
        }
        return dir;
      }

      function getSidePerpendicularDirection(P, Q) {
        const dx = Q.x - P.x;
        const dy = Q.y - P.y;
        const len = Math.hypot(dx, dy) || 1;
        return { x: -dy / len, y: dx / len };
      }

      function projectPointToLine(point, origin, direction) {
        const denom = direction.x * direction.x + direction.y * direction.y;
        if (denom < 1e-9) {
          return { x: origin.x, y: origin.y };
        }
        const t = ((point.x - origin.x) * direction.x + (point.y - origin.y) * direction.y) / denom;
        return {
          x: origin.x + direction.x * t,
          y: origin.y + direction.y * t
        };
      }

      function getLabelMovementConstraint(type, id, triangle) {
        return null;
      }

      function toggleHiddenLabel(type, id) {
        if (!labelState[type] || typeof labelState[type][id] === 'undefined') return;

        function getDefaultFontSize(typeKey, idKey) {
          const defaults = {
            vertex: { A: 36, B: 36, C: 36, H: 32 },
            side: { BC: 32, CA: 32, AB: 32, AH: 26, BH: 26, CH: 26 },
            innerAngle: { A: 26, B: 26, C: 26, CAH: 26, CBH: 26, ACH: 26, BCH: 26, CHA: 26, CHB: 26 },
            angleMark: { A: 26, B: 26, C: 26, CAH: 26, CBH: 26, ACH: 26, BCH: 26, CHA: 26, CHB: 26 },
            perp: { CHA: 26, CHB: 26 },
            area: { main: 48 }
          };
          return defaults[typeKey] && Number.isFinite(defaults[typeKey][idKey]) ? defaults[typeKey][idKey] : 32;
        }

        function resetLabelVisual(typeKey, idKey) {
          if (labelPositions[typeKey]) labelPositions[typeKey][idKey] = null;
          if (labelFontSize[typeKey]) labelFontSize[typeKey][idKey] = getDefaultFontSize(typeKey, idKey);
          if (customLabelText[typeKey] && typeof customLabelText[typeKey][idKey] !== 'undefined') {
            customLabelText[typeKey][idKey] = '';
          }
          if (typeKey === 'area' && customLabelText.area && typeof customLabelText.area[idKey] !== 'undefined') {
            customLabelText.area[idKey] = '';
          }
          const styleDefaults = createLabelStyleState();
          if (labelStyleState[typeKey] && styleDefaults[typeKey] && styleDefaults[typeKey][idKey]) {
            labelStyleState[typeKey][idKey] = {
              color: styleDefaults[typeKey][idKey].color,
              rotation: styleDefaults[typeKey][idKey].rotation
            };
          }
        }

        if (!labelState[type][id]) {
          labelState[type][id] = true;
          hiddenLabelState[type][id] = false;
          resetLabelVisual(type, id);
          return;
        }
        hiddenLabelState[type][id] = !hiddenLabelState[type][id];
        if (!hiddenLabelState[type][id]) {
          resetLabelVisual(type, id);
        }
        if (selectedLabel && selectedLabel.type === type && selectedLabel.id === id && hiddenLabelState[type][id]) {
          selectedLabel = null;
        }
      }

      function findNearestLabel(point) {
        function getScreenPaddingByType(type) {
          if (type === 'side') return 0;
          if (type === 'vertex') return 2;
          if (type === 'innerAngle') return 12;
          if (type === 'area') return 14;
          return 4;
        }
        const pointScreen = userToScreenPoint(point);
        for (let index = 0; index < currentLabelAnchors.length; index += 1) {
          const label = currentLabelAnchors[index];
          if (label.hidden) continue;
          if (label.screenRect) {
            const pad = getScreenPaddingByType(label.type);
            if (
              pointScreen.x >= label.screenRect.left - pad &&
              pointScreen.x <= label.screenRect.right + pad &&
              pointScreen.y >= label.screenRect.top - pad &&
              pointScreen.y <= label.screenRect.bottom + pad
            ) {
              return { type: label.type, id: label.id };
            }
            continue;
          }
          const bounds = getLabelBounds(label);
          if (pointInRotatedRect(point, bounds.center, bounds.width, bounds.height, label.rotation, 0)) {
            return { type: label.type, id: label.id };
          }
        }
        return null;
      }

      function detectInteractiveTarget(coords) {
        if (!currentGeometry) return null;
        const A = currentGeometry.A;
        const B = currentGeometry.B;
        const C = currentGeometry.C;
        const vertexTolerance = 0.34;

        if (Math.hypot(coords.x - A.x, coords.y - A.y) <= vertexTolerance) return { type: 'vertex', id: 'A' };
        if (Math.hypot(coords.x - B.x, coords.y - B.y) <= vertexTolerance) return { type: 'vertex', id: 'B' };
        if (Math.hypot(coords.x - C.x, coords.y - C.y) <= vertexTolerance) return { type: 'vertex', id: 'C' };

        const sideHits = [
          { id: 'a', segment: distanceToSegment(coords, B, C) },
          { id: 'b', segment: distanceToSegment(coords, C, A) },
          { id: 'c', segment: distanceToSegment(coords, A, B) }
        ];
        for (let i = 0; i < sideHits.length; i += 1) {
          const hit = sideHits[i];
          if (hit.segment.distance <= 0.22 && hit.segment.t >= 0.12 && hit.segment.t <= 0.88) {
            return { type: 'side', id: hit.id };
          }
        }

        const angleAreas = [
          { id: 'A', vertex: A, first: B, second: C },
          { id: 'B', vertex: B, first: C, second: A },
          { id: 'C', vertex: C, first: A, second: B }
        ];

        for (let j = 0; j < angleAreas.length; j += 1) {
          const area = angleAreas[j];
          if (angleSectorContains(coords, area.vertex, area.first, area.second, true)) {
            return { type: 'innerAngle', id: area.id };
          }
        }

        if (pointInTriangle(coords, A, B, C)) return { type: 'area', id: 'main' };
        return null;
      }

      function isFigureZone(coords) {
        if (!currentGeometry) return false;
        const A = currentGeometry.A;
        const B = currentGeometry.B;
        const C = currentGeometry.C;
        return (
          pointInTriangle(coords, A, B, C) ||
          distanceToSegment(coords, A, B).distance <= 0.22 ||
          distanceToSegment(coords, B, C).distance <= 0.22 ||
          distanceToSegment(coords, C, A).distance <= 0.22
        );
      }

      function handleBoardInteraction(coords) {
        if (!currentGeometry) return;
        const selected = findNearestLabel(coords);
        if (selected) {
          selectedLabel = selected;
          selectedFigure = false;
          isPaletteOpen = false;
          render();
          return;
        }
        const overlayControl = findSelectionControl(coords);
        if (overlayControl && overlayControl.mode === 'palette-color' && selectedLabel) {
          pushHistorySnapshot();
          labelStyleState[selectedLabel.type][selectedLabel.id].color = overlayControl.color;
          isPaletteOpen = false;
          render();
          return;
        }
        if (overlayControl && overlayControl.mode === 'palette-color' && selectedFigure) {
          pushHistorySnapshot();
          figureState.color = overlayControl.color;
          isPaletteOpen = false;
          render();
          return;
        }
        if (overlayControl && overlayControl.mode === 'palette' && selectedLabel) {
          isPaletteOpen = !isPaletteOpen;
          render();
          return;
        }
        if (overlayControl && overlayControl.mode === 'palette' && selectedFigure) {
          isPaletteOpen = !isPaletteOpen;
          render();
          return;
        }
        if (isFigureZone(coords)) {
          hoveredLabel = null;
          selectedLabel = null;
          selectedFigure = true;
          isPaletteOpen = false;
          render();
          return;
        }
        if (selectedLabel || selectedFigure || isPaletteOpen) {
          hoveredLabel = null;
          selectedLabel = null;
          selectedFigure = false;
          isPaletteOpen = false;
          render();
        }
      }

      async function handleDownload(format) {
        if (!box) throw new Error('保存対象が見つかりません。');

        const canvas = await html2canvas(box, {
          backgroundColor: format === 'png-transparent' ? null : '#ffffff',
          scale: 2
        });
        const cropped = cropCanvasToFrame(canvas);

        if (format === 'png') {
          const url = cropped.toDataURL('image/png');
          const link = document.createElement('a');
          link.href = url;
          link.download = 'triangle-base-height.png';
          link.click();
          return;
        }

        if (format === 'png-transparent') {
          const url = cropped.toDataURL('image/png');
          const link = document.createElement('a');
          link.href = url;
          link.download = 'triangle-base-height-transparent.png';
          link.click();
          return;
        }

        if (format === 'pdf') {
          const jsPDF = window.jspdf && window.jspdf.jsPDF;
          if (!jsPDF) throw new Error('PDF 出力の読み込みに失敗しました。');

          const orientation = exportAspects[exportAspectIndex].value > 1 ? 'landscape' : 'portrait';
          const pdf = new jsPDF(orientation, 'mm', 'a4');
          const imageData = cropped.toDataURL('image/png');
          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          let drawWidth = pageWidth;
          let drawHeight = cropped.height * drawWidth / cropped.width;

          if (drawHeight > pageHeight) {
            drawHeight = pageHeight;
            drawWidth = cropped.width * drawHeight / cropped.height;
          }

          const x = (pageWidth - drawWidth) / 2;
          const y = (pageHeight - drawHeight) / 2;
          pdf.addImage(imageData, 'PNG', x, y, drawWidth, drawHeight);
          pdf.save('triangle-base-height.pdf');
          return;
        }

        throw new Error('未対応の保存形式です。');
      }

      function render() {
        if (renderRafId !== null) {
          window.cancelAnimationFrame(renderRafId);
          renderRafId = null;
        }
        board.suspendUpdate();
        board.removeObject(board.objectsList.slice());
        labelLayer.innerHTML = '';
        currentLabelAnchors = [];
        currentSelectionOverlay = null;

        try {
          const abExpr = evaluateExpression(sideAInput.value, '底辺 AB');
          const chExpr = evaluateExpression(sideBInput.value, '高さ CH');
          const ahExpr = evaluateRealExpression(sideCInput.value, 'AH');
          const baseTriangle = computeTriangle(abExpr.value, chExpr.value, ahExpr.value);
          const triangle = applyFigureTransform(baseTriangle, true);
          const points = [baseTriangle.A, baseTriangle.B, baseTriangle.C, baseTriangle.H];
          currentGeometry = triangle;

          updateExportFrame();
          const fitSignature = JSON.stringify({
            points: points,
            zoomScale: zoomScale,
            aspectIndex: exportAspectIndex,
            boxWidth: box.clientWidth,
            boxHeight: box.clientHeight
          });
          if (fitSignature !== lastFitSignature) {
            fitBoard(points);
            lastFitSignature = fitSignature;
          }

          const pointA = board.create('point', [triangle.A.x, triangle.A.y], { name: '', size: 3, fixed: true, strokeColor: '#111111', fillColor: '#111111' });
          const pointB = board.create('point', [triangle.B.x, triangle.B.y], { name: '', size: 3, fixed: true, strokeColor: '#111111', fillColor: '#111111' });
          const pointC = board.create('point', [triangle.C.x, triangle.C.y], { name: '', size: 3, fixed: true, strokeColor: '#111111', fillColor: '#111111' });
          const pointH = board.create('point', [triangle.H.x, triangle.H.y], { name: '', size: 3, fixed: true, strokeColor: '#111111', fillColor: '#111111' });
          const chStyle = getLabelStyle('side', 'CH');
          const chLineStyle = { strokeWidth: 2, strokeColor: chStyle.color || '#111111', dash: 2, fixed: true, highlight: false };
          function isVisible(type, id) {
            return !!(labelState[type] && labelState[type][id] && !(hiddenLabelState[type] && hiddenLabelState[type][id]));
          }
          function isAngleMarkVisible(id) {
            return angleMarkerMode[id] !== 0 && isVisible('angleMark', id);
          }
          function shouldDrawBaseHeightHelperSegment(id) {
            if (segmentLineMode.side[id] === 0) return false;
            if (isVisible('side', id)) return true;
            if (id === 'AH') {
              return ['CAH', 'CHA'].some(function (angleId) {
                return isVisible('innerAngle', angleId) || isAngleMarkVisible(angleId);
              }) || isVisible('perp', 'CHA');
            }
            if (id === 'BH') {
              return ['CBH', 'CHB'].some(function (angleId) {
                return isVisible('innerAngle', angleId) || isAngleMarkVisible(angleId);
              }) || isVisible('perp', 'CHB');
            }
            if (id === 'CH') {
              return ['ACH', 'BCH', 'CHA', 'CHB'].some(function (angleId) {
                return isVisible('innerAngle', angleId) || isAngleMarkVisible(angleId);
              }) || isVisible('perp', 'CHA') || isVisible('perp', 'CHB');
            }
            return false;
          }
          if (shouldDrawBaseHeightHelperSegment('CH')) {
            board.create('segment', [pointC, pointH], chLineStyle);
          }
          if (shouldDrawBaseHeightHelperSegment('AH')) {
            board.create('segment', [pointA, pointH], chLineStyle);
          }
          if (shouldDrawBaseHeightHelperSegment('BH')) {
            board.create('segment', [pointB, pointH], chLineStyle);
          }

          const polygon = board.create('polygon', [pointA, pointB, pointC], {
            borders: { visible: false, fixed: true, highlight: false },
            fillColor: 'rgba(0,0,0,0)',
            fillOpacity: 0,
            vertices: { visible: false },
            highlight: false
          });
          const edgeStyle = { strokeWidth: 2, strokeColor: figureState.color, fixed: true, highlight: false };
          if (!hiddenLabelState.side.BC || segmentLineMode.side.BC !== 0) board.create('segment', [pointB, pointC], edgeStyle);
          if (!hiddenLabelState.side.CA || segmentLineMode.side.CA !== 0) board.create('segment', [pointC, pointA], edgeStyle);
          if (!hiddenLabelState.side.AB || segmentLineMode.side.AB !== 0) board.create('segment', [pointA, pointB], edgeStyle);

          const centroid = {
            x: (triangle.A.x + triangle.B.x + triangle.C.x) / 3,
            y: (triangle.A.y + triangle.B.y + triangle.C.y) / 3
          };

          if (labelState.vertex.A && !hiddenLabelState.vertex.A) {
            createSelectableText(getLabelPosition('vertex', 'A', getCentroidVertexExternalPoint(centroid, triangle.A)), vertexLabelText.A || 'A', labelFontSize.vertex.A, { type: 'vertex', id: 'A' }, { color: '#1f2430' });
          }
          if (labelState.vertex.B && !hiddenLabelState.vertex.B) {
            createSelectableText(getLabelPosition('vertex', 'B', getCentroidVertexExternalPoint(centroid, triangle.B)), vertexLabelText.B || 'B', labelFontSize.vertex.B, { type: 'vertex', id: 'B' }, { color: '#1f2430' });
          }
          if (labelState.vertex.C && !hiddenLabelState.vertex.C) {
            createSelectableText(getLabelPosition('vertex', 'C', getCentroidVertexExternalPoint(centroid, triangle.C)), vertexLabelText.C || 'C', labelFontSize.vertex.C, { type: 'vertex', id: 'C' }, { color: '#1f2430' });
          }
          if (labelState.vertex.H && !hiddenLabelState.vertex.H) {
            createSelectableText(getLabelPosition('vertex', 'H', labelPointAway(triangle.H, centroid, 0.9)), vertexLabelText.H || 'H', labelFontSize.vertex.H, { type: 'vertex', id: 'H' }, { color: '#1f2430' });
          }

          if (labelState.side.BC && !hiddenLabelState.side.BC) {
            drawSideArcLabel(triangle.B, triangle.C, centroid, getCustomSideText('BC', formatHypotenuseSymbolic(baseTriangle.CH, baseTriangle.BH)), 'BC');
          }
          if (labelState.side.CA && !hiddenLabelState.side.CA) {
            drawSideArcLabel(triangle.C, triangle.A, centroid, getCustomSideText('CA', formatHypotenuseSymbolic(baseTriangle.CH, baseTriangle.AH)), 'CA');
          }
          if (labelState.side.AB && !hiddenLabelState.side.AB) {
            drawSideArcLabel(triangle.A, triangle.B, centroid, getCustomSideText('AB', formatLengthSymbolic(baseTriangle.AB)), 'AB');
          }
          if (labelState.side.AH && !hiddenLabelState.side.AH) {
            drawSideArcLabel(triangle.A, triangle.H, centroid, getCustomSideText('AH', formatLengthSymbolic(baseTriangle.AH)), 'AH');
          }
          if (labelState.side.BH && !hiddenLabelState.side.BH) {
            drawSideArcLabel(triangle.B, triangle.H, centroid, getCustomSideText('BH', formatLengthSymbolic(baseTriangle.BH)), 'BH');
          }
          if (labelState.side.CH && !hiddenLabelState.side.CH) {
            drawSideArcLabel(triangle.C, triangle.H, centroid, getCustomSideText('CH', formatLengthSymbolic(baseTriangle.CH)), 'CH');
          }

          const innerLabelColor = '#687086';
          if (labelState.innerAngle.A && !hiddenLabelState.innerAngle.A) {
            createSelectableText(getLabelPosition('innerAngle', 'A', labelPointNear(triangle.A, triangle.C, 1.0)), getCustomAngleText('A', formatAngleValue(baseTriangle.angleCAH)), labelFontSize.innerAngle.A, { type: 'innerAngle', id: 'A' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.B && !hiddenLabelState.innerAngle.B) {
            createSelectableText(getLabelPosition('innerAngle', 'B', labelPointNear(triangle.B, triangle.C, 1.0)), getCustomAngleText('B', formatAngleValue(baseTriangle.angleCBH)), labelFontSize.innerAngle.B, { type: 'innerAngle', id: 'B' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.C && !hiddenLabelState.innerAngle.C) {
            createSelectableText(getLabelPosition('innerAngle', 'C', getCentroidVertexInternalPoint(centroid, triangle.C)), getCustomAngleText('C', formatAngleValue(baseTriangle.angleACB)), labelFontSize.innerAngle.C, { type: 'innerAngle', id: 'C' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.CAH && !hiddenLabelState.innerAngle.CAH) {
            createSelectableText(getLabelPosition('innerAngle', 'CAH', labelPointNear(triangle.A, triangle.C, 1.16)), getCustomAngleText('CAH', formatAngleValue(baseTriangle.angleCAH)), labelFontSize.innerAngle.CAH, { type: 'innerAngle', id: 'CAH' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.CBH && !hiddenLabelState.innerAngle.CBH) {
            createSelectableText(getLabelPosition('innerAngle', 'CBH', labelPointNear(triangle.B, triangle.C, 1.16)), getCustomAngleText('CBH', formatAngleValue(baseTriangle.angleCBH)), labelFontSize.innerAngle.CBH, { type: 'innerAngle', id: 'CBH' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.ACH && !hiddenLabelState.innerAngle.ACH) {
            createSelectableText(getLabelPosition('innerAngle', 'ACH', labelPointNear(triangle.C, triangle.A, 0.95)), getCustomAngleText('ACH', formatAngleValue(baseTriangle.angleACH)), labelFontSize.innerAngle.ACH, { type: 'innerAngle', id: 'ACH' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.BCH && !hiddenLabelState.innerAngle.BCH) {
            createSelectableText(getLabelPosition('innerAngle', 'BCH', labelPointNear(triangle.C, triangle.B, 0.95)), getCustomAngleText('BCH', formatAngleValue(baseTriangle.angleBCH)), labelFontSize.innerAngle.BCH, { type: 'innerAngle', id: 'BCH' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.CHA && !hiddenLabelState.innerAngle.CHA) {
            createSelectableText(getLabelPosition('innerAngle', 'CHA', labelPointBetween(triangle.H, triangle.C, triangle.A, 0.84)), getCustomAngleText('CHA', formatAngleValue(90)), labelFontSize.innerAngle.CHA, { type: 'innerAngle', id: 'CHA' }, { color: innerLabelColor });
          }
          if (labelState.innerAngle.CHB && !hiddenLabelState.innerAngle.CHB) {
            createSelectableText(getLabelPosition('innerAngle', 'CHB', labelPointBetween(triangle.H, triangle.C, triangle.B, 0.84)), getCustomAngleText('CHB', formatAngleValue(90)), labelFontSize.innerAngle.CHB, { type: 'innerAngle', id: 'CHB' }, { color: innerLabelColor });
          }

          ['A', 'B', 'C', 'CAH', 'CBH', 'ACH', 'BCH', 'CHA', 'CHB'].forEach(function (angleId) {
            if (labelState.angleMark[angleId] && !hiddenLabelState.angleMark[angleId]) {
              drawAngleDecoration(angleId, triangle);
            }
          });
          ['CHA', 'CHB'].forEach(function (perpId) {
            if (labelState.perp[perpId] && !hiddenLabelState.perp[perpId]) {
              const perpGeom = getPerpMarkerGeometry(triangle, perpId, labelFontSize.perp[perpId]);
              const p0 = perpGeom.p0;
              const p1 = perpGeom.p1;
              const p2 = perpGeom.p2;
              const p3 = perpGeom.p3;
              const perpStyle = getLabelStyle('perp', perpId);
              const markStyle = { strokeWidth: 2, strokeColor: perpStyle.color || '#111111', fixed: true, highlight: false };
              board.create('segment', [[p1.x, p1.y], [p2.x, p2.y]], markStyle);
              board.create('segment', [[p2.x, p2.y], [p3.x, p3.y]], markStyle);

              const screenPoints = [p0, p1, p2, p3].map(userToScreenPoint);
              const xs = screenPoints.map(function (pt) { return pt.x; });
              const ys = screenPoints.map(function (pt) { return pt.y; });
              currentLabelAnchors.push({
                type: 'perp',
                id: perpId,
                x: perpGeom.center.x,
                y: perpGeom.center.y,
                threshold: 0.45,
                curveThreshold: null,
                curveHit: null,
                visible: true,
                hidden: false,
                text: '⊥',
                fontSize: labelFontSize.perp[perpId],
                color: perpStyle.color || '#111111',
                rotation: getLabelStyle('perp', perpId).rotation || 0,
                screenRect: {
                  left: Math.min.apply(null, xs),
                  top: Math.min.apply(null, ys),
                  right: Math.max.apply(null, xs),
                  bottom: Math.max.apply(null, ys)
                }
              });
            }
          });

          if (labelState.area.main && !hiddenLabelState.area.main) {
            const s = (baseTriangle.AB + baseTriangle.BC + baseTriangle.CA) / 2;
            const areaRadicand = s * (s - baseTriangle.AB) * (s - baseTriangle.BC) * (s - baseTriangle.CA);
            const areaText = formatAreaRadical(areaRadicand);
            createSelectableText(
              getLabelPosition('area', 'main', { x: centroid.x, y: centroid.y }),
              getCustomAreaText('△' + mapVertexTokens('ABC') + ' = ' + appendUnit(areaText, true)),
              labelFontSize.area.main,
              { type: 'area', id: 'main' },
              { color: '#25603b', threshold: 0.8 }
            );
          }

          renderSelectionOverlay(getSelectedAnchor() || getFigureSelectionAnchor());
          setStatus(t('sss.status.rendered', '底辺＋高さの三角形を描画しました。'), false);
        } catch (error) {
          currentGeometry = null;
          currentSelectionOverlay = null;
          setStatus(error.message || '描画に失敗しました。', true);
        } finally {
          board.unsuspendUpdate();
        }
      }

      [sideAInput, sideBInput, sideCInput].forEach(function (input) {
        input.addEventListener('focus', function () {
          pendingInputSnapshot = captureState();
        });
        input.addEventListener('input', render);
      });

      [sideAInput, sideBInput, sideCInput].forEach(function (input) {
        input.addEventListener('change', function () {
          if (pendingInputSnapshot) {
            pushSpecificSnapshot(pendingInputSnapshot);
            pendingInputSnapshot = null;
          }
          resetVisualState();
          render();
        });
      });

      downloadButtons.forEach(function (button) {
        button.addEventListener('click', async function () {
          const format = button.dataset.downloadFormat;

          try {
            const label = (button.textContent || '').trim() || (format || '').toUpperCase();
            setStatus(t('sss.status.saving', '') + label + '...', false);
            await handleDownload(format);
            setStatus(t('sss.status.saved', '') + label + '。', false);
          } catch (error) {
            setStatus(error.message || t('sss.status.saveFailed', 'ダウンロードに失敗しました。'), true);
          }
        });
      });

      box.addEventListener('click', function (event) {
        if (suppressClick) {
          suppressClick = false;
          return;
        }
        if (!currentGeometry) return;
        const coords = board.getUsrCoordsOfMouse(event);
        handleBoardInteraction({ x: coords[0], y: coords[1] });
      });

      box.addEventListener('mousedown', function (event) {
        if (!currentGeometry) return;
        const coords = board.getUsrCoordsOfMouse(event);
        const overlayControl = findSelectionControl({ x: coords[0], y: coords[1] });
        if ((selectedLabel || selectedFigure) && overlayControl) {
          if (overlayControl.mode === 'palette-color') {
            pushHistorySnapshot();
            if (selectedLabel) {
              labelStyleState[selectedLabel.type][selectedLabel.id].color = overlayControl.color;
            } else if (selectedFigure) {
              figureState.color = overlayControl.color;
            }
            isPaletteOpen = false;
            render();
            return;
          }
          if (overlayControl.mode === 'palette') {
            isPaletteOpen = !isPaletteOpen;
            render();
            return;
          }
          if (overlayControl.mode === 'rotate' && selectedLabel && selectedLabel.type === 'perp') {
            return;
          }
          const anchorForSelection = selectedLabel ? getSelectedAnchor() : getFigureSelectionAnchor();
          if (!anchorForSelection) return;
          pushHistorySnapshot();
          const perpStartGeom = (selectedLabel && selectedLabel.type === 'perp' && overlayControl.mode === 'resize')
            ? getPerpMarkerGeometry(currentGeometry, selectedLabel.id, labelFontSize.perp[selectedLabel.id])
            : null;
          const dragCenter = (selectedLabel && selectedLabel.type === 'angleMark' && anchorForSelection.scaleCenter)
            ? { x: anchorForSelection.scaleCenter.x, y: anchorForSelection.scaleCenter.y }
            : { x: anchorForSelection.x, y: anchorForSelection.y };
          dragState = {
            mode: overlayControl.mode,
            target: selectedLabel ? 'label' : 'figure',
            type: selectedLabel ? selectedLabel.type : 'figure',
            id: selectedLabel ? selectedLabel.id : 'main',
            startClient: { x: event.clientX, y: event.clientY },
            fontSizeStart: selectedLabel ? labelFontSize[selectedLabel.type][selectedLabel.id] : null,
            scaleStart: selectedFigure ? figureState.scale : null,
            rotationStart: selectedLabel ? labelStyleState[selectedLabel.type][selectedLabel.id].rotation : figureState.rotation,
            center: dragCenter,
            distanceStart: Math.hypot(coords[0] - dragCenter.x, coords[1] - dragCenter.y),
            angleStart: Math.atan2(coords[1] - dragCenter.y, coords[0] - dragCenter.x),
            perpCornerStart: perpStartGeom ? { x: perpStartGeom.p0.x, y: perpStartGeom.p0.y } : null,
            perpDirSum: perpStartGeom ? { x: perpStartGeom.dirHX.x + perpStartGeom.dirHC.x, y: perpStartGeom.dirHX.y + perpStartGeom.dirHC.y } : null,
            perpMarkerSizeStart: perpStartGeom ? perpStartGeom.markerSize : null
          };
          return;
        }

        const selected = findNearestLabel({ x: coords[0], y: coords[1] });
        if (selected) {
          const anchor = currentLabelAnchors.find(function (item) {
            return item.type === selected.type && item.id === selected.id;
          });
          if (!anchor) return;
          if (selected.type === 'perp' || selected.type === 'angleMark') {
            hoveredLabel = null;
            selectedLabel = selected;
            selectedFigure = false;
            isPaletteOpen = false;
            render();
            return;
          }
          pushHistorySnapshot();
          hoveredLabel = null;
          selectedLabel = selected;
          selectedFigure = false;
          isPaletteOpen = false;
          const existingPosition = labelPositions[selected.type][selected.id] || { x: anchor.x, y: anchor.y };
          dragState = {
            mode: 'label',
            type: selected.type,
            id: selected.id,
            moved: false,
            startClient: { x: event.clientX, y: event.clientY },
            labelStart: { x: existingPosition.x, y: existingPosition.y }
          };
          return;
        }

        if (isFigureZone({ x: coords[0], y: coords[1] })) {
          pushHistorySnapshot();
          hoveredLabel = null;
          selectedLabel = null;
          selectedFigure = true;
          isPaletteOpen = false;
          dragState = {
            mode: 'figure-move',
            moved: false,
            startClient: { x: event.clientX, y: event.clientY },
            offsetStart: { x: figureState.offset.x, y: figureState.offset.y }
          };
        }
      });

      box.addEventListener('mousemove', function (event) {
        const coords = board.getUsrCoordsOfMouse(event);
        const currentPoint = { x: coords[0], y: coords[1] };

        if (!dragState || !currentGeometry) {
          return;
        }

        if (dragState.mode === 'label') {
          const boundingBox = board.getBoundingBox();
          const unitsPerPixelX = (boundingBox[2] - boundingBox[0]) / Math.max(box.clientWidth, 1);
          const unitsPerPixelY = (boundingBox[1] - boundingBox[3]) / Math.max(box.clientHeight, 1);
          const deltaX = event.clientX - dragState.startClient.x;
          const deltaY = event.clientY - dragState.startClient.y;
          const candidate = {
            x: dragState.labelStart.x + (deltaX * unitsPerPixelX),
            y: dragState.labelStart.y - (deltaY * unitsPerPixelY)
          };
          const constraint = getLabelMovementConstraint(dragState.type, dragState.id, currentGeometry);
          labelPositions[dragState.type][dragState.id] = constraint
            ? projectPointToLine(candidate, constraint.origin, constraint.direction)
            : candidate;
          dragState.moved = true;
          suppressClick = true;
          scheduleRender();
          return;
        }

        if (dragState.mode === 'resize') {
          if (dragState.target === 'label') {
            if (dragState.type === 'perp' && dragState.perpCornerStart && dragState.perpDirSum) {
              const diagDirRaw = dragState.perpDirSum;
              const diagLen = Math.hypot(diagDirRaw.x, diagDirRaw.y) || 1;
              const diagDir = { x: diagDirRaw.x / diagLen, y: diagDirRaw.y / diagLen };
              const v = { x: currentPoint.x - dragState.perpCornerStart.x, y: currentPoint.y - dragState.perpCornerStart.y };
              const diagonal = Math.max(0.02, v.x * diagDir.x + v.y * diagDir.y);
              const nextMarkerSize = Math.max(0.05, diagonal / Math.SQRT2);
              const startMarker = Math.max(dragState.perpMarkerSizeStart || 0.05, 1e-6);
              const ratio = Math.max(0.3, Math.min(8, nextMarkerSize / startMarker));
              labelFontSize.perp[dragState.id] = Math.max(4, Math.min(320, Math.round(dragState.fontSizeStart * ratio)));
            } else {
              const currentDistance = Math.hypot(currentPoint.x - dragState.center.x, currentPoint.y - dragState.center.y);
              const ratio = Math.max(0.3, Math.min(8, currentDistance / Math.max(dragState.distanceStart, 0.01)));
              labelFontSize[dragState.type][dragState.id] = Math.max(10, Math.min(320, Math.round(dragState.fontSizeStart * ratio)));
            }
          } else {
            const currentDistance = Math.hypot(currentPoint.x - dragState.center.x, currentPoint.y - dragState.center.y);
            const ratio = Math.max(0.45, Math.min(3.2, currentDistance / Math.max(dragState.distanceStart, 0.01)));
            const nextScale = Math.max(0.3, Math.min(4, dragState.scaleStart * ratio));
            const scaleRatio = nextScale / Math.max(figureState.scale, 1e-9);
            if (Math.abs(scaleRatio - 1) > 1e-9 && currentGeometry) {
              const center = getTriangleCentroid(currentGeometry);
              scaleLabelGroupAround(center, scaleRatio, 'vertex');
              scaleLabelGroupAround(center, scaleRatio, 'side');
              scaleLabelGroupAround(center, scaleRatio, 'innerAngle');
              scaleLabelGroupAround(center, scaleRatio, 'angleMark');
              scaleLabelGroupAround(center, scaleRatio, 'perp');
              scaleLabelGroupAround(center, scaleRatio, 'area');
              scaleLabelFontGroup(scaleRatio, 'vertex');
              scaleLabelFontGroup(scaleRatio, 'side');
              scaleLabelFontGroup(scaleRatio, 'innerAngle');
              scaleLabelFontGroup(scaleRatio, 'angleMark');
              scaleLabelFontGroup(scaleRatio, 'perp');
              scaleLabelFontGroup(scaleRatio, 'area');
            }
            figureState.scale = nextScale;
          }
          suppressClick = true;
          scheduleRender();
          return;
        }

        if (dragState.mode === 'rotate') {
          const currentAngle = Math.atan2(currentPoint.y - dragState.center.y, currentPoint.x - dragState.center.x);
          if (dragState.target === 'label') {
            if (dragState.type === 'perp' || dragState.type === 'angleMark') {
              return;
            }
            labelStyleState[dragState.type][dragState.id].rotation = dragState.rotationStart + ((currentAngle - dragState.angleStart) * 180 / Math.PI);
          } else {
            const nextRotation = dragState.rotationStart + ((currentAngle - dragState.angleStart) * 180 / Math.PI);
            const deltaRotation = nextRotation - figureState.rotation;
            if (Math.abs(deltaRotation) > 1e-9 && currentGeometry) {
              const center = getTriangleCentroid(currentGeometry);
              rotateLabelGroupAround(center, deltaRotation, 'vertex');
              rotateLabelGroupAround(center, deltaRotation, 'side');
              rotateLabelGroupAround(center, deltaRotation, 'innerAngle');
              rotateLabelGroupAround(center, deltaRotation, 'angleMark');
              rotateLabelGroupAround(center, deltaRotation, 'perp');
              rotateLabelGroupAround(center, deltaRotation, 'area');
            }
            figureState.rotation = nextRotation;
          }
          suppressClick = true;
          scheduleRender();
          return;
        }

        if (dragState.mode === 'figure-move') {
          const boundingBox = board.getBoundingBox();
          const unitsPerPixelX = (boundingBox[2] - boundingBox[0]) / Math.max(box.clientWidth, 1);
          const unitsPerPixelY = (boundingBox[1] - boundingBox[3]) / Math.max(box.clientHeight, 1);
          const deltaX = event.clientX - dragState.startClient.x;
          const deltaY = event.clientY - dragState.startClient.y;
          const nextOffset = {
            x: dragState.offsetStart.x + (deltaX * unitsPerPixelX),
            y: dragState.offsetStart.y - (deltaY * unitsPerPixelY)
          };
          const offsetDelta = {
            x: nextOffset.x - figureState.offset.x,
            y: nextOffset.y - figureState.offset.y
          };
          if (Math.abs(offsetDelta.x) > 1e-9 || Math.abs(offsetDelta.y) > 1e-9) {
            translateLabelGroup(offsetDelta, 'vertex');
            translateLabelGroup(offsetDelta, 'side');
            translateLabelGroup(offsetDelta, 'innerAngle');
            translateLabelGroup(offsetDelta, 'angleMark');
            translateLabelGroup(offsetDelta, 'perp');
            translateLabelGroup(offsetDelta, 'area');
          }
          figureState.offset = nextOffset;
          dragState.moved = true;
          suppressClick = true;
          scheduleRender();
        }
      });

      window.addEventListener('mouseup', function () {
        dragState = null;
      });

      box.addEventListener('wheel', function (event) {
        event.preventDefault();
        pushHistorySnapshot();
        zoomScale = Math.max(0.45, Math.min(4, zoomScale * (event.deltaY < 0 ? 1.08 : 1 / 1.08)));
        lastFitSignature = '';
        render();
      }, { passive: false });

      ratioBtn.addEventListener('click', function () {
        pushHistorySnapshot();
        exportAspectIndex = (exportAspectIndex + 1) % exportAspects.length;
        updateExportFrame();
        updateRatioButton();
        lastFitSignature = '';
        render();
      });

      unitBtn.addEventListener('click', function () {
        pushHistorySnapshot();
        unitIndex = (unitIndex + 1) % unitOptions.length;
        updateUnitButton();
        renderLabelToggleButtons();
        render();
      });

      angleModeBtn.addEventListener('click', function () {
        pushHistorySnapshot();
        angleMode = angleMode === 'degrees' ? 'radians' : 'degrees';
        updateAngleModeButton();
        renderLabelToggleButtons();
        render();
      });

      function resetVisualState() {
        hiddenLabelState.vertex = { A: false, B: false, C: false, H: false };
        hiddenLabelState.side = { BC: true, CA: true, AB: false, AH: true, BH: true, CH: true };
        hiddenLabelState.innerAngle = { A: true, B: true, C: true, CAH: true, CBH: true, ACH: true, BCH: true, CHA: true, CHB: true };
        hiddenLabelState.angleMark = { A: false, B: false, C: false, CAH: false, CBH: false, ACH: false, BCH: false, CHA: false, CHB: false };
        hiddenLabelState.perp = { CHA: true, CHB: true };
        hiddenLabelState.area = { main: true };
        labelFontSize.vertex = { A: 36, B: 36, C: 36, H: 32 };
        labelFontSize.side = { BC: 32, CA: 32, AB: 32, AH: 26, BH: 26, CH: 26 };
        labelFontSize.innerAngle = { A: 26, B: 26, C: 26, CAH: 26, CBH: 26, ACH: 26, BCH: 26, CHA: 26, CHB: 26 };
        labelFontSize.angleMark = { A: 26, B: 26, C: 26, CAH: 26, CBH: 26, ACH: 26, BCH: 26, CHA: 26, CHB: 26 };
        labelFontSize.perp = { CHA: 26, CHB: 26 };
        labelFontSize.area = { main: 48 };
        vertexLabelText.A = 'A';
        vertexLabelText.B = 'B';
        vertexLabelText.C = 'C';
        vertexLabelText.H = 'H';
        angleMarkerMode.A = 0;
        angleMarkerMode.B = 0;
        angleMarkerMode.C = 0;
        angleMarkerMode.CAH = 0;
        angleMarkerMode.CBH = 0;
        angleMarkerMode.ACH = 0;
        angleMarkerMode.BCH = 0;
        angleMarkerMode.CHA = 0;
        angleMarkerMode.CHB = 0;
        segmentArcMode.side = { BC: 1, CA: 1, AB: 1, AH: 1, BH: 1, CH: 1 };
        segmentLineMode.side = { BC: 1, CA: 1, AB: 1, AH: 0, BH: 0, CH: 0 };
        customLabelText.side = { BC: '', CA: '', AB: '', AH: '', BH: '', CH: '' };
        customLabelText.innerAngle = { A: '', B: '', C: '', CAH: '', CBH: '', ACH: '', BCH: '', CHA: '', CHB: '' };
        customLabelText.area = { main: '' };
        labelStyleState = createLabelStyleState();
        figureState = {
          color: '#2a5bd7',
          rotation: 0,
          scale: 1,
          offset: { x: 0, y: 0 }
        };
        labelPositions.vertex = { A: null, B: null, C: null, H: null };
        labelPositions.side = { BC: null, CA: null, AB: null, AH: null, BH: null, CH: null };
        labelPositions.innerAngle = { A: null, B: null, C: null, CAH: null, CBH: null, ACH: null, BCH: null, CHA: null, CHB: null };
        labelPositions.angleMark = { A: null, B: null, C: null, CAH: null, CBH: null, ACH: null, BCH: null, CHA: null, CHB: null };
        labelPositions.perp = { CHA: null, CHB: null };
        labelPositions.area = { main: null };
        zoomScale = 1;
        viewCenterOffset = { x: 0, y: 0 };
        angleMode = 'degrees';
        unitIndex = 1;
        hoveredLabel = null;
        selectedLabel = null;
        selectedFigure = false;
        isPaletteOpen = false;
        dragState = null;
        suppressClick = false;
        updateAngleModeButton();
        updateUnitButton();
        renderLabelToggleButtons();
        lastFitSignature = '';
      }

      resetBtn.addEventListener('click', function () {
        pushHistorySnapshot();
        resetVisualState();
        render();
      });

      if (dockToggleBtn && leftDock) {
        dockToggleBtn.addEventListener('click', function () {
          isDockCollapsed = !isDockCollapsed;
          leftDock.classList.toggle('is-collapsed', isDockCollapsed);
          updateDockToggleButton();
        });
      }

      if (rightDockToggleBtn && rightDock) {
        rightDockToggleBtn.addEventListener('click', function () {
          isRightDockCollapsed = !isRightDockCollapsed;
          rightDock.classList.toggle('is-collapsed', isRightDockCollapsed);
          updateRightDockToggleButton();
        });
      }

      if (pageBackBtn) {
        pageBackBtn.addEventListener('click', function () {
          window.history.back();
        });
      }

      if (undoBtn) {
        undoBtn.addEventListener('click', function () {
          restoreFromHistory(historyPast, historyFuture);
        });
      }

      if (redoBtn) {
        redoBtn.addEventListener('click', function () {
          restoreFromHistory(historyFuture, historyPast);
        });
      }

      window.addEventListener('resize', function () {
        updateExportFrame();
        lastFitSignature = '';
        render();
      });

      if (window.siteI18n && typeof window.siteI18n.setLanguage === 'function') {
        window.siteI18n.setLanguage('ja');
      }
      document.addEventListener('site-components:ready', applyPageTranslations);
      applyPageTranslations();
      updateDockToggleButton();
      updateRightDockToggleButton();
      updateAngleModeButton();
      updateUnitButton();
      renderLabelToggleButtons();
      render();
    })();
  </script>
</body>
</html>
