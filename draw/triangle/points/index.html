<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三角形（3点座標）準備中 | Instant Geometry</title>
  <link rel="stylesheet" href="/assets/base.css" />
  <style>
    :root{
      --panel:#ffffff;
      --line:#d9dce7;
      --text:#1f2430;
      --muted:#687086;
      --accent:#2a5bd7;
      --shadow:0 10px 28px rgba(27,39,94,.08);
    }

    *{box-sizing:border-box}

    html,body{
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      color:var(--text);
      background:
        repeating-linear-gradient(45deg, rgba(42,91,215,.06) 0 12px, transparent 12px 28px),
        linear-gradient(180deg,#f8faff 0%,#f3f6fc 100%);
    }

    .page{
      position:relative;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .back-btn{
      position:absolute;
      top:8px;
      left:50%;
      transform:translateX(-50%);
      z-index:10;
      min-width:156px;
      padding:10px 14px;
      border:1px solid #cfd7ea;
      border-radius:13px;
      background:linear-gradient(180deg,#ffffff 0%,#f6f8ff 100%);
      color:#24304d;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 1px 0 rgba(255,255,255,.9) inset, 0 2px 8px rgba(36,71,168,.08);
    }

    .back-btn:hover{
      border-color:#9fb3ea;
      color:#1f3d94;
      background:linear-gradient(180deg,#ffffff 0%,#eef3ff 100%);
    }

    .card{
      width:min(740px,calc(100vw - 48px));
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:34px 30px;
      text-align:center;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:#1f3d94;
      background:#eef3ff;
      border:1px solid #cfdcff;
    }

    h1{
      margin:14px 0 8px;
      font-size:34px;
      line-height:1.2;
      letter-spacing:-.01em;
    }

    p{
      margin:0 auto;
      max-width:560px;
      color:var(--muted);
      font-size:15px;
      line-height:1.85;
    }

    .dots{
      margin:22px auto 0;
      display:flex;
      justify-content:center;
      gap:8px;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:#2a5bd7;
      animation:blink 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2){ animation-delay:.15s; }
    .dot:nth-child(3){ animation-delay:.3s; }

    .links{
      margin-top:24px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:136px;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid #d6dcef;
      background:#fff;
      color:#22345e;
      text-decoration:none;
      font-size:13px;
      font-weight:700;
    }

    .link.primary{
      border-color:#b8c8f2;
      background:linear-gradient(180deg,#ffffff 0%,#edf2ff 100%);
      color:#1f3d94;
    }

    @keyframes blink{
      0%,80%,100%{ opacity:.28; transform:translateY(0); }
      40%{ opacity:1; transform:translateY(-2px); }
    }
  </style>
</head>
<body>
  <main class="page">
    <button class="back-btn" type="button" onclick="history.back()">前の画面に戻る</button>
    <section class="card" aria-live="polite">
      <span class="pill">COMING SOON</span>
      <h1>三角形（3点座標）は準備中です</h1>
      <p>座標系を前提にした専用UI・補助線・ラベル操作を、他の三角形ページと整合する形で実装中です。<br>今は先に、他の三角形モードをご利用ください。</p>
      <div class="dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="links">
        <a class="link primary" href="/draw/triangle/sss/">SSS を開く</a>
        <a class="link" href="/draw/triangle/base-height/">底辺＋高さを開く</a>
        <a class="link" href="/draw/">図形一覧へ戻る</a>
      </div>
    </section>
  </main>
</body>
</html>
