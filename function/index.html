<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>関数を描く | Instant Geometry</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --line:#d9dce7;
      --text:#1f2430;
      --muted:#687086;
      --accent:#2a5bd7;
      --accent-soft:#eef3ff;
      --shadow:0 10px 28px rgba(27,39,94,.08);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#f8faff 0%,#f4f6fb 100%);
      color:var(--text);
    }

    .wrap{
      width:min(1100px,calc(100% - 32px));
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:700;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:var(--accent);
      color:#fff;
    }

    .nav{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .nav a,
    .auth-status{
      padding:10px 14px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:14px;
      color:var(--muted);
    }

    .nav a:hover{
      border-color:var(--accent);
      color:var(--accent);
      background:var(--accent-soft);
    }

    .auth-status[data-auth-state="logged-in"]{
      color:#1f7a39;
      background:#eefaf1;
      border-color:#cfe8d6;
    }

    .auth-status[data-auth-state="logged-out"]{
      color:#9a6700;
      background:#fff8e6;
      border-color:#f0dfb2;
    }

    .hero{
      text-align:center;
      padding:40px 0 20px;
    }

    h1{
      font-size:40px;
      margin:0;
    }

    .lead{
      margin-top:16px;
      color:var(--muted);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px;
      box-shadow:var(--shadow);
      transition:.2s;
      cursor:pointer;
    }

    .card:hover{
      transform:translateY(-4px);
    }

    .card h3{
      margin:0 0 10px;
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    @media(max-width:800px){
      .cards{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>

<body>
  <div class="wrap">

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">ƒ</div>
        <div>Instant Geometry</div>
      </div>

      <nav class="nav">
        <span class="auth-status" id="authStatus">確認中...</span>
        <a href="/">トップ</a>
        <a href="/draw/">図形</a>
        <a href="/coming-soon/?feature=problems">問題</a>
        <a href="/login/" id="loginBtn">ログイン</a>
      </nav>
    </header>

    <section class="hero">
      <h1>関数を描く</h1>
      <p class="lead">
        一次関数、二次関数、三角関数などを目的別に描画します
      </p>
    </section>

    <section class="cards">

      <div class="card" onclick="location.href='/functions/linear/'">
        <h3>一次関数</h3>
        <p>
          y = ax + b のグラフを描画します。<br>
          傾きや切片を指定できます。
        </p>
      </div>

      <div class="card" onclick="location.href='/functions/quadratic/'">
        <h3>二次関数</h3>
        <p>
          y = ax² + bx + c を描画します。<br>
          頂点や軸も表示可能。
        </p>
      </div>

      <div class="card" onclick="location.href='/functions/trig/'">
        <h3>三角関数</h3>
        <p>
          sin・cos・tan を描画します。<br>
          周期や位相も設定可能。
        </p>
      </div>

    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-client.js"></script>
  <script src="/assets/auth-ui.js"></script>
</body>
</html>
