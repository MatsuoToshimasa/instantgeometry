<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Geometry</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --panel-gap: 16px;
      --border: 1px solid #d0d7de;
      --paper-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      margin: 16px;
      color: #111;
      background: #f7f7f8;
    }

    h1, h2, h3 {
      margin: 0 0 8px 0;
      font-weight: 600;
    }

    p {
      margin: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr 360px;
      gap: var(--panel-gap);
      align-items: start;
    }

    .panel {
      background: #fff;
      border: var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #ececec;
    }

    .section:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .row label.inline {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .grid-2, .grid-3 {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 13px;
      color: #333;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cfd7df;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
    }

    .mode-group { display: none; }
    .mode-group.active { display: block; }

    .board-wrap {
      background: #fff;
      border: var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    #box {
      width: 100%;
      min-height: 640px;
      height: 70vh;
      border: 1px solid #d8d8d8;
      background: #fff;
      border-radius: 8px;
      touch-action: none;
    }

    .paper-stage {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      background: #eef1f4;
      border-radius: 12px;
      border: var(--border);
      overflow: auto;
      min-height: 680px;
    }

    #paperPreview {
      position: relative;
      background: white;
      box-shadow: var(--paper-shadow);
      border: 1px solid #ccc;
      flex: 0 0 auto;
    }

    #paperInner {
      position: absolute;
      border: 1px dashed #b9c2cc;
      overflow: hidden;
      background: white;
    }

    #paperBox {
      width: 100%;
      height: 100%;
      background: white;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f5f7fa;
      border: 1px solid #e3e8ee;
      min-height: 44px;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #2447a8;
      margin-top: 8px;
    }

    .size-list {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #c5ced8;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      background: #111;
      color: white;
      border-color: #111;
    }

    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }

      #box {
        min-height: 480px;
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <h1>Instant Geometry</h1>
  <p class="muted">第一段階の実装です。SSS / SAS / ASA / AAS / AAA / 3点座標 / 底辺＋高さ＋足の位置、PNG/JPEG/PDF、A4/B5印刷プレビュー、ルート入力に対応しています。</p>

  <div class="layout">
    <div class="panel">
      <div class="section">
        <h2>入力</h2>
        <div class="field">
          <label for="mode">入力方式</label>
          <select id="mode">
            <option value="sss">SSS（三辺）</option>
            <option value="sas">SAS（二辺とその間の角）</option>
            <option value="asa">ASA（一辺とその両端の角）</option>
            <option value="aas">AAS（一辺と二角）</option>
            <option value="aaa">AAA（三角）</option>
            <option value="points">3点座標</option>
            <option value="baseHeight">底辺＋高さ＋足の位置</option>
          </select>
        </div>
        <div class="badge">数式入力可: 3, 3/2, sqrt(5), √5, 2√3, 1+√2</div>
      </div>

      <div class="section mode-group active" data-mode="sss">
        <h3>SSS</h3>
        <div class="grid-3">
          <div class="field"><label for="sss-a">a = BC</label><input id="sss-a" type="text" value="3" /></div>
          <div class="field"><label for="sss-b">b = CA</label><input id="sss-b" type="text" value="4" /></div>
          <div class="field"><label for="sss-c">c = AB</label><input id="sss-c" type="text" value="5" /></div>
        </div>
      </div>

      <div class="section mode-group" data-mode="sas">
        <h3>SAS</h3>
        <div class="grid-3">
          <div class="field"><label for="sas-b">b = CA</label><input id="sas-b" type="text" value="4" /></div>
          <div class="field"><label for="sas-c">c = AB</label><input id="sas-c" type="text" value="5" /></div>
          <div class="field"><label for="sas-A">∠A (deg)</label><input id="sas-A" type="text" value="90" /></div>
        </div>
      </div>

      <div class="section mode-group" data-mode="asa">
        <h3>ASA</h3>
        <div class="grid-3">
          <div class="field"><label for="asa-c">c = AB</label><input id="asa-c" type="text" value="5" /></div>
          <div class="field"><label for="asa-A">∠A (deg)</label><input id="asa-A" type="text" value="36.87" /></div>
          <div class="field"><label for="asa-B">∠B (deg)</label><input id="asa-B" type="text" value="53.13" /></div>
        </div>
      </div>

      <div class="section mode-group" data-mode="aas">
        <h3>AAS</h3>
        <div class="grid-3">
          <div class="field"><label for="aas-a">a = BC</label><input id="aas-a" type="text" value="3" /></div>
          <div class="field"><label for="aas-A">∠A (deg)</label><input id="aas-A" type="text" value="36.87" /></div>
          <div class="field"><label for="aas-B">∠B (deg)</label><input id="aas-B" type="text" value="53.13" /></div>
        </div>
      </div>

      <div class="section mode-group" data-mode="aaa">
        <h3>AAA</h3>
        <div class="grid-3">
          <div class="field"><label for="aaa-A">∠A (deg)</label><input id="aaa-A" type="text" value="36.87" /></div>
          <div class="field"><label for="aaa-B">∠B (deg)</label><input id="aaa-B" type="text" value="53.13" /></div>
          <div class="field"><label for="aaa-C">∠C (deg)</label><input id="aaa-C" type="text" value="90" /></div>
        </div>
        <div class="muted" style="margin-top:8px;">内部では基準辺 AB = 1 として描画します。</div>
      </div>

      <div class="section mode-group" data-mode="points">
        <h3>3点座標</h3>
        <div class="grid-3">
          <div class="field"><label for="Ax">Ax</label><input id="Ax" type="text" value="0" /></div>
          <div class="field"><label for="Ay">Ay</label><input id="Ay" type="text" value="0" /></div>
          <div></div>
          <div class="field"><label for="Bx">Bx</label><input id="Bx" type="text" value="5" /></div>
          <div class="field"><label for="By">By</label><input id="By" type="text" value="0" /></div>
          <div></div>
          <div class="field"><label for="Cx">Cx</label><input id="Cx" type="text" value="1.8" /></div>
          <div class="field"><label for="Cy">Cy</label><input id="Cy" type="text" value="2.4" /></div>
          <div></div>
        </div>
      </div>

      <div class="section mode-group" data-mode="baseHeight">
        <h3>底辺＋高さ＋足の位置</h3>
        <div class="grid-3">
          <div class="field"><label for="bh-c">底辺 c = AB</label><input id="bh-c" type="text" value="5" /></div>
          <div class="field"><label for="bh-h">高さ h</label><input id="bh-h" type="text" value="2.4" /></div>
          <div class="field"><label for="bh-t">足の位置 t</label><input id="bh-t" type="text" value="1.8" /></div>
        </div>
      </div>

      <div class="section">
        <h2>表示</h2>
        <div class="row">
          <label class="inline"><input id="showAxes" type="checkbox" checked />座標軸</label>
          <label class="inline"><input id="showCoordLabels" type="checkbox" checked />座標ラベル</label>
          <label class="inline"><input id="showSideLabels" type="checkbox" checked />辺の長さ</label>
          <label class="inline"><input id="showPrintPreview" type="checkbox" checked />印刷プレビュー更新</label>
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="pointLabelSize">点ラベル</label>
            <input id="pointLabelSize" type="range" min="10" max="32" step="1" value="18" />
          </div>
          <div class="field">
            <label for="sideLabelSize">辺ラベル</label>
            <input id="sideLabelSize" type="range" min="10" max="32" step="1" value="18" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="sideTextMode">辺長表示形式</label>
            <select id="sideTextMode">
              <option value="decimal">小数</option>
              <option value="root">ルート優先</option>
              <option value="input">入力式優先</option>
            </select>
          </div>
          <div class="field">
            <label for="unitCm">1単位 = 何cm</label>
            <input id="unitCm" type="text" value="1" />
          </div>
        </div>
      </div>

      <div class="section">
        <h2>印刷設定</h2>
        <div class="grid-2">
          <div class="field">
            <label for="paperSize">用紙</label>
            <select id="paperSize">
              <option value="A4">A4</option>
              <option value="B5">B5</option>
            </select>
          </div>
          <div class="field">
            <label for="paperOrientation">向き</label>
            <select id="paperOrientation">
              <option value="portrait">縦</option>
              <option value="landscape">横</option>
            </select>
          </div>
          <div class="field"><label for="marginTop">上余白(cm)</label><input id="marginTop" type="text" value="1.5" /></div>
          <div class="field"><label for="marginBottom">下余白(cm)</label><input id="marginBottom" type="text" value="1.5" /></div>
          <div class="field"><label for="marginLeft">左余白(cm)</label><input id="marginLeft" type="text" value="1.5" /></div>
          <div class="field"><label for="marginRight">右余白(cm)</label><input id="marginRight" type="text" value="1.5" /></div>
        </div>
        <div class="row">
          <label class="inline"><input type="radio" name="printMode" value="actual" checked />実寸</label>
          <label class="inline"><input type="radio" name="printMode" value="fit" />用紙内に収める</label>
        </div>
      </div>

      <div class="section">
        <h2>保存</h2>
        <div class="buttons">
          <button class="primary" id="btnPng">PNG</button>
          <button id="btnJpeg">JPEG</button>
          <button id="btnPdf">PDF</button>
          <button id="btnRender">再描画</button>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="board-wrap">
      <h2>編集画面</h2>
      <div id="box" class="jxgbox"></div>
    </div>

    <div class="panel">
      <h2>印刷プレビュー</h2>
      <div class="muted">この領域が PDF 出力の元になります。</div>
      <div class="size-list" id="printInfo"></div>
      <div class="paper-stage" style="margin-top:12px;">
        <div id="paperPreview">
          <div id="paperInner">
            <div id="paperBox" class="jxgbox"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PAPER_SIZES_MM = {
      A4: { width: 210, height: 297 },
      B5: { width: 182, height: 257 }
    };

    const PAPER_PREVIEW_SCALE = 3.0; // 1mm -> 3px

    let board = null;
    let paperBoard = null;
    let latestModel = null;

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function nearlyEqual(a, b, eps = 1e-9) {
      return Math.abs(a - b) < eps;
    }

    function sanitizeExpression(expr) {
      return expr
        .replace(/\s+/g, '')
        .replace(/√/g, 'sqrt')
        .replace(/(\d)(sqrt)/g, '$1*$2')
        .replace(/\)(\d|sqrt)/g, ')*$1')
        .replace(/(\d|\))(\()/g, '$1*$2');
    }

    function parseExpr(expr) {
      const raw = String(expr ?? '').trim();
      if (!raw) throw new Error('空の入力があります。');
      const safe = sanitizeExpression(raw);
      if (!/^[0-9+\-*/().sqrt]+$/i.test(safe)) {
        throw new Error(`使えない文字があります: ${raw}`);
      }
      const jsExpr = safe.replace(/sqrt/gi, 'Math.sqrt');
      const value = Function(`"use strict"; return (${jsExpr});`)();
      if (!Number.isFinite(value)) throw new Error(`数値として解釈できません: ${raw}`);
      return { value, raw };
    }

    function parsePositiveExpr(expr, label) {
      const parsed = parseExpr(expr);
      if (!(parsed.value > 0)) {
        throw new Error(`${label} は正である必要があります。`);
      }
      return parsed;
    }

    function parseAngleExpr(expr, label) {
      const parsed = parseExpr(expr);
      if (!(parsed.value > 0 && parsed.value < 180)) {
        throw new Error(`${label} は 0° より大きく 180° 未満にしてください。`);
      }
      return parsed;
    }

    function getPointDisplayText(name, point, showCoordLabels) {
      if (!showCoordLabels) return name;
      return `${name}(${formatDecimal(point.x)}, ${formatDecimal(point.y)})`;
    }

    function formatDecimal(x) {
      const rounded = Math.round(x * 100) / 100;
      if (nearlyEqual(rounded, Math.round(rounded))) return String(Math.round(rounded));
      return rounded.toFixed(2);
    }

    function tryRootFormat(x) {
      const sign = x < 0 ? '-' : '';
      const abs = Math.abs(x);
      for (let k = 1; k <= 12; k++) {
        for (let n = 1; n <= 200; n++) {
          const candidate = k * Math.sqrt(n);
          if (Math.abs(candidate - abs) < 1e-8) {
            if (n === 1) return sign + String(k);
            if (k === 1) return sign + `√${n}`;
            return sign + `${k}√${n}`;
          }
        }
      }
      return null;
    }

    function triangleArea2(points) {
      const { A, B, C } = points;
      return (B.x - A.x) * (C.y - A.y) - (B.y - A.y) * (C.x - A.x);
    }

    function sideLength(P, Q) {
      return Math.hypot(Q.x - P.x, Q.y - P.y);
    }

    function centroid(points) {
      return {
        x: (points.A.x + points.B.x + points.C.x) / 3,
        y: (points.A.y + points.B.y + points.C.y) / 3
      };
    }

    function unitVector(from, to) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const len = Math.hypot(dx, dy) || 1;
      return { x: dx / len, y: dy / len };
    }

    function unitNormalOutside(P, Q, ctr) {
      const dx = Q.x - P.x;
      const dy = Q.y - P.y;
      const len = Math.hypot(dx, dy) || 1;
      let nx = -dy / len;
      let ny = dx / len;
      const mid = { x: (P.x + Q.x) / 2, y: (P.y + Q.y) / 2 };
      const toCtr = { x: ctr.x - mid.x, y: ctr.y - mid.y };
      if (nx * toCtr.x + ny * toCtr.y > 0) {
        nx = -nx;
        ny = -ny;
      }
      return { x: nx, y: ny };
    }

    function quadraticPoint(p1, control, p2, t) {
      return {
        x: (1 - t) * (1 - t) * p1.x + 2 * (1 - t) * t * control.x + t * t * p2.x,
        y: (1 - t) * (1 - t) * p1.y + 2 * (1 - t) * t * control.y + t * t * p2.y
      };
    }

    function showModeFields() {
      const mode = document.getElementById('mode').value;
      document.querySelectorAll('.mode-group').forEach(group => {
        group.classList.toggle('active', group.dataset.mode === mode);
      });
    }

    function getDisplayOptions() {
      return {
        showAxes: document.getElementById('showAxes').checked,
        showCoordLabels: document.getElementById('showCoordLabels').checked,
        showSideLabels: document.getElementById('showSideLabels').checked,
        pointLabelSize: Number(document.getElementById('pointLabelSize').value),
        sideLabelSize: Number(document.getElementById('sideLabelSize').value),
        sideTextMode: document.getElementById('sideTextMode').value,
        unitCm: parsePositiveExpr(document.getElementById('unitCm').value, '1単位あたりのcm').value
      };
    }

    function getPrintOptions() {
      const paperSize = document.getElementById('paperSize').value;
      const orientation = document.getElementById('paperOrientation').value;
      return {
        paperSize,
        orientation,
        marginTop: parsePositiveExpr(document.getElementById('marginTop').value, '上余白').value,
        marginBottom: parsePositiveExpr(document.getElementById('marginBottom').value, '下余白').value,
        marginLeft: parsePositiveExpr(document.getElementById('marginLeft').value, '左余白').value,
        marginRight: parsePositiveExpr(document.getElementById('marginRight').value, '右余白').value,
        mode: document.querySelector('input[name="printMode"]:checked').value
      };
    }

    function computeFromSSS() {
      const a = parsePositiveExpr(document.getElementById('sss-a').value, 'a');
      const b = parsePositiveExpr(document.getElementById('sss-b').value, 'b');
      const c = parsePositiveExpr(document.getElementById('sss-c').value, 'c');
      if (a.value + b.value <= c.value || b.value + c.value <= a.value || c.value + a.value <= b.value) {
        throw new Error('三角形不成立です。');
      }
      const A = { x: 0, y: 0 };
      const B = { x: c.value, y: 0 };
      const Cx = (b.value * b.value + c.value * c.value - a.value * a.value) / (2 * c.value);
      const Cy2 = b.value * b.value - Cx * Cx;
      const C = { x: Cx, y: Math.sqrt(Math.max(0, Cy2)) };
      return {
        points: { A, B, C },
        expressions: { a: a.raw, b: b.raw, c: c.raw }
      };
    }

    function computeFromSAS() {
      const b = parsePositiveExpr(document.getElementById('sas-b').value, 'b');
      const c = parsePositiveExpr(document.getElementById('sas-c').value, 'c');
      const Aang = parseAngleExpr(document.getElementById('sas-A').value, '∠A');
      const A = { x: 0, y: 0 };
      const B = { x: c.value, y: 0 };
      const C = { x: b.value * Math.cos(degToRad(Aang.value)), y: b.value * Math.sin(degToRad(Aang.value)) };
      return {
        points: { A, B, C },
        expressions: { b: b.raw, c: c.raw }
      };
    }

    function computeFromASA() {
      const c = parsePositiveExpr(document.getElementById('asa-c').value, 'c');
      const Aang = parseAngleExpr(document.getElementById('asa-A').value, '∠A');
      const Bang = parseAngleExpr(document.getElementById('asa-B').value, '∠B');
      const Cang = 180 - Aang.value - Bang.value;
      if (!(Cang > 0)) throw new Error('角の和が 180° 未満ではありません。');
      const A = { x: 0, y: 0 };
      const B = { x: c.value, y: 0 };
      const x = (c.value * Math.tan(degToRad(Bang.value))) / (Math.tan(degToRad(Aang.value)) + Math.tan(degToRad(Bang.value)));
      const C = { x, y: x * Math.tan(degToRad(Aang.value)) };
      return {
        points: { A, B, C },
        expressions: { c: c.raw }
      };
    }

    function computeFromAAS() {
      const a = parsePositiveExpr(document.getElementById('aas-a').value, 'a');
      const Aang = parseAngleExpr(document.getElementById('aas-A').value, '∠A');
      const Bang = parseAngleExpr(document.getElementById('aas-B').value, '∠B');
      const Cang = 180 - Aang.value - Bang.value;
      if (!(Cang > 0)) throw new Error('角の和が 180° 未満ではありません。');
      const cVal = a.value * Math.sin(degToRad(Cang)) / Math.sin(degToRad(Aang));
      const A = { x: 0, y: 0 };
      const B = { x: cVal, y: 0 };
      const x = (cVal * Math.tan(degToRad(Bang.value))) / (Math.tan(degToRad(Aang.value)) + Math.tan(degToRad(Bang.value)));
      const C = { x, y: x * Math.tan(degToRad(Aang.value)) };
      return {
        points: { A, B, C },
        expressions: { a: a.raw }
      };
    }

    function computeFromAAA() {
      const Aang = parseAngleExpr(document.getElementById('aaa-A').value, '∠A');
      const Bang = parseAngleExpr(document.getElementById('aaa-B').value, '∠B');
      const Cang = parseAngleExpr(document.getElementById('aaa-C').value, '∠C');
      const sum = Aang.value + Bang.value + Cang.value;
      if (Math.abs(sum - 180) > 1e-7) throw new Error('三角の和を 180° にしてください。');
      const cVal = 1;
      const A = { x: 0, y: 0 };
      const B = { x: cVal, y: 0 };
      const x = (cVal * Math.tan(degToRad(Bang.value))) / (Math.tan(degToRad(Aang.value)) + Math.tan(degToRad(Bang.value)));
      const C = { x, y: x * Math.tan(degToRad(Aang.value)) };
      return {
        points: { A, B, C },
        expressions: { base: '1' }
      };
    }

    function computeFromPoints() {
      const Ax = parseExpr(document.getElementById('Ax').value).value;
      const Ay = parseExpr(document.getElementById('Ay').value).value;
      const Bx = parseExpr(document.getElementById('Bx').value).value;
      const By = parseExpr(document.getElementById('By').value).value;
      const Cx = parseExpr(document.getElementById('Cx').value).value;
      const Cy = parseExpr(document.getElementById('Cy').value).value;
      const points = { A: { x: Ax, y: Ay }, B: { x: Bx, y: By }, C: { x: Cx, y: Cy } };
      if (Math.abs(triangleArea2(points)) < 1e-9) throw new Error('3点が一直線上にあります。');
      return { points, expressions: {} };
    }

    function computeFromBaseHeight() {
      const c = parsePositiveExpr(document.getElementById('bh-c').value, '底辺');
      const h = parsePositiveExpr(document.getElementById('bh-h').value, '高さ');
      const t = parseExpr(document.getElementById('bh-t').value);
      if (!(t.value >= 0 && t.value <= c.value)) {
        throw new Error('足の位置 t は 0 以上 c 以下にしてください。');
      }
      return {
        points: { A: { x: 0, y: 0 }, B: { x: c.value, y: 0 }, C: { x: t.value, y: h.value } },
        expressions: { c: c.raw, h: h.raw, t: t.raw }
      };
    }

    function computeModel() {
      const mode = document.getElementById('mode').value;
      let model;
      if (mode === 'sss') model = computeFromSSS();
      else if (mode === 'sas') model = computeFromSAS();
      else if (mode === 'asa') model = computeFromASA();
      else if (mode === 'aas') model = computeFromAAS();
      else if (mode === 'aaa') model = computeFromAAA();
      else if (mode === 'points') model = computeFromPoints();
      else if (mode === 'baseHeight') model = computeFromBaseHeight();
      else throw new Error('未対応のモードです。');
      if (Math.abs(triangleArea2(model.points)) < 1e-9) throw new Error('面積が 0 のため三角形になりません。');
      model.mode = mode;
      model.display = getDisplayOptions();
      model.print = getPrintOptions();
      model.metrics = computeMetrics(model.points, model.display.unitCm);
      return model;
    }

    function computeMetrics(points, unitCm) {
      const a = sideLength(points.B, points.C);
      const b = sideLength(points.C, points.A);
      const c = sideLength(points.A, points.B);
      const xs = [points.A.x, points.B.x, points.C.x];
      const ys = [points.A.y, points.B.y, points.C.y];
      const widthUnits = Math.max(...xs) - Math.min(...xs);
      const heightUnits = Math.max(...ys) - Math.min(...ys);
      return {
        sideUnits: { a, b, c },
        sideCm: { a: a * unitCm, b: b * unitCm, c: c * unitCm },
        widthUnits,
        heightUnits,
        widthCm: widthUnits * unitCm,
        heightCm: heightUnits * unitCm
      };
    }

    function getSideLabelText(model, key, value) {
      const mode = model.display.sideTextMode;
      const expr = model.expressions[key];
      if (mode === 'input' && expr) return expr;
      if (mode === 'root') {
        const root = tryRootFormat(value);
        if (root) return root;
      }
      return formatDecimal(value);
    }

    function makeBoundingBox(points, extra = 0.9) {
      const xs = [points.A.x, points.B.x, points.C.x];
      const ys = [points.A.y, points.B.y, points.C.y];
      let minX = Math.min(...xs);
      let maxX = Math.max(...xs);
      let minY = Math.min(...ys);
      let maxY = Math.max(...ys);
      let width = Math.max(maxX - minX, 1);
      let height = Math.max(maxY - minY, 1);
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      const side = Math.max(width, height) + extra * Math.max(width, height, 1);
      return [centerX - side / 2, centerY + side / 2, centerX + side / 2, centerY - side / 2];
    }

    function disposeBoard(target) {
      if (target === 'main' && board) {
        JXG.JSXGraph.freeBoard(board);
        board = null;
        document.getElementById('box').innerHTML = '';
      }
      if (target === 'paper' && paperBoard) {
        JXG.JSXGraph.freeBoard(paperBoard);
        paperBoard = null;
        document.getElementById('paperBox').innerHTML = '';
      }
    }

    function createAxes(targetBoard) {
      targetBoard.create('axis', [[0, 0], [1, 0]], {
        withLabel: false,
        strokeWidth: 1,
        ticks: {
          drawLabels: true,
          insertTicks: true,
          ticksDistance: 1,
          minorTicks: 0,
          label: { offset: [0, -12] }
        }
      });
      targetBoard.create('axis', [[0, 0], [0, 1]], {
        withLabel: false,
        strokeWidth: 1,
        ticks: {
          drawLabels: true,
          insertTicks: true,
          ticksDistance: 1,
          minorTicks: 0,
          label: { offset: [-12, 0] }
        }
      });
    }

    function addPointLabelText(targetBoard, vertex, ctr, text, labelSize) {
      const outward = unitVector(ctr, vertex);
      const pos = { x: vertex.x + outward.x * 0.5, y: vertex.y + outward.y * 0.5 };
      targetBoard.create('text', [pos.x, pos.y, text], {
        fontSize: labelSize,
        fixed: true,
        anchorX: 'middle',
        anchorY: 'middle'
      });
    }

    function addSideArcAndLabel(targetBoard, P, Q, labelText, ctr, labelSize) {
      const mid = { x: (P.x + Q.x) / 2, y: (P.y + Q.y) / 2 };
      const dx = Q.x - P.x;
      const dy = Q.y - P.y;
      const len = Math.hypot(dx, dy) || 1;
      const n = unitNormalOutside(P, Q, ctr);
      const arcHeight = Math.max(0.35, len * 0.12);
      const endInset = Math.min(0.22, len * 0.1);
      const p1 = { x: P.x + (dx / len) * endInset, y: P.y + (dy / len) * endInset };
      const p2 = { x: Q.x - (dx / len) * endInset, y: Q.y - (dy / len) * endInset };
      const control = { x: mid.x + n.x * arcHeight, y: mid.y + n.y * arcHeight };
      const gapHalf = 0.14;

      targetBoard.create('curve', [
        t => quadraticPoint(p1, control, p2, t).x,
        t => quadraticPoint(p1, control, p2, t).y,
        0, 0.5 - gapHalf
      ], { strokeWidth: 2, dash: 2, fixed: true });

      targetBoard.create('curve', [
        t => quadraticPoint(p1, control, p2, t).x,
        t => quadraticPoint(p1, control, p2, t).y,
        0.5 + gapHalf, 1
      ], { strokeWidth: 2, dash: 2, fixed: true });

      const centerPoint = quadraticPoint(p1, control, p2, 0.5);
      targetBoard.create('text', [centerPoint.x, centerPoint.y, labelText], {
        fontSize: labelSize,
        fixed: true,
        anchorX: 'middle',
        anchorY: 'middle',
        cssStyle: 'background:white;padding:0 4px;'
      });
    }

    function renderToBoard(targetBoard, model) {
      const { points, display } = model;
      if (display.showAxes) createAxes(targetBoard);

      const A = targetBoard.create('point', [points.A.x, points.A.y], {
        name: '', size: 3, fixed: true, withLabel: false
      });
      const B = targetBoard.create('point', [points.B.x, points.B.y], {
        name: '', size: 3, fixed: true, withLabel: false
      });
      const C = targetBoard.create('point', [points.C.x, points.C.y], {
        name: '', size: 3, fixed: true, withLabel: false
      });

      targetBoard.create('polygon', [A, B, C], {
        borders: { strokeWidth: 2 },
        fillColor: 'lightgray',
        fillOpacity: 0.15
      });

      const ctr = centroid(points);
      addPointLabelText(targetBoard, points.A, ctr, getPointDisplayText('A', points.A, display.showCoordLabels), display.pointLabelSize);
      addPointLabelText(targetBoard, points.B, ctr, getPointDisplayText('B', points.B, display.showCoordLabels), display.pointLabelSize);
      addPointLabelText(targetBoard, points.C, ctr, getPointDisplayText('C', points.C, display.showCoordLabels), display.pointLabelSize);

      if (display.showSideLabels) {
        addSideArcAndLabel(targetBoard, points.B, points.C, getSideLabelText(model, 'a', model.metrics.sideUnits.a), ctr, display.sideLabelSize);
        addSideArcAndLabel(targetBoard, points.C, points.A, getSideLabelText(model, 'b', model.metrics.sideUnits.b), ctr, display.sideLabelSize);
        addSideArcAndLabel(targetBoard, points.A, points.B, getSideLabelText(model, 'c', model.metrics.sideUnits.c), ctr, display.sideLabelSize);
      }
    }

    function renderMainBoard(model) {
      disposeBoard('main');
      board = JXG.JSXGraph.initBoard('box', {
        boundingbox: makeBoundingBox(model.points),
        axis: false,
        keepaspectratio: true,
        zoom: { wheel: true, needShift: false },
        pan: { enabled: true, needTwoFingers: true },
        showNavigation: false,
        showCopyright: false
      });
      renderToBoard(board, model);
      board.update();
    }

    function setupPaperFrame(printOptions) {
      const base = PAPER_SIZES_MM[printOptions.paperSize];
      let widthMm = base.width;
      let heightMm = base.height;
      if (printOptions.orientation === 'landscape') {
        [widthMm, heightMm] = [heightMm, widthMm];
      }

      const outer = document.getElementById('paperPreview');
      const inner = document.getElementById('paperInner');

      outer.style.width = `${widthMm * PAPER_PREVIEW_SCALE}px`;
      outer.style.height = `${heightMm * PAPER_PREVIEW_SCALE}px`;

      const leftPx = printOptions.marginLeft * 10 * PAPER_PREVIEW_SCALE;
      const rightPx = printOptions.marginRight * 10 * PAPER_PREVIEW_SCALE;
      const topPx = printOptions.marginTop * 10 * PAPER_PREVIEW_SCALE;
      const bottomPx = printOptions.marginBottom * 10 * PAPER_PREVIEW_SCALE;

      inner.style.left = `${leftPx}px`;
      inner.style.top = `${topPx}px`;
      inner.style.width = `${widthMm * PAPER_PREVIEW_SCALE - leftPx - rightPx}px`;
      inner.style.height = `${heightMm * PAPER_PREVIEW_SCALE - topPx - bottomPx}px`;

      return {
        widthMm,
        heightMm,
        printableWidthCm: (widthMm / 10) - printOptions.marginLeft - printOptions.marginRight,
        printableHeightCm: (heightMm / 10) - printOptions.marginTop - printOptions.marginBottom
      };
    }

    function makePrintModel(model, printable) {
      const cloned = JSON.parse(JSON.stringify(model));
      const widthCm = Math.max(cloned.metrics.widthCm, 0.01);
      const heightCm = Math.max(cloned.metrics.heightCm, 0.01);
      const fitScale = Math.min(printable.printableWidthCm / widthCm, printable.printableHeightCm / heightCm);
      const scale = cloned.print.mode === 'actual' ? 1 : Math.min(1, fitScale);
      cloned.print.effectiveScale = scale;

      const ctr = centroid(cloned.points);
      for (const key of ['A', 'B', 'C']) {
        cloned.points[key].x = (cloned.points[key].x - ctr.x) * scale;
        cloned.points[key].y = (cloned.points[key].y - ctr.y) * scale;
      }
      cloned.metrics = computeMetrics(cloned.points, cloned.display.unitCm);
      return cloned;
    }

    function renderPaperBoard(model) {
      disposeBoard('paper');
      const printable = setupPaperFrame(model.print);
      const printModel = makePrintModel(model, printable);
      paperBoard = JXG.JSXGraph.initBoard('paperBox', {
        boundingbox: makeBoundingBox(printModel.points, 0.6),
        axis: false,
        keepaspectratio: true,
        showNavigation: false,
        showCopyright: false,
        pan: { enabled: false },
        zoom: { wheel: false }
      });
      renderToBoard(paperBoard, printModel);
      paperBoard.update();
      updatePrintInfo(model, printable, printModel);
    }

    function updatePrintInfo(originalModel, printable, printModel) {
      const info = document.getElementById('printInfo');
      const m = printModel.metrics;
      info.innerHTML = `
        <div>用紙</div><div>${originalModel.print.paperSize} / ${originalModel.print.orientation === 'portrait' ? '縦' : '横'}</div>
        <div>印刷可能領域</div><div>${formatDecimal(printable.printableWidthCm)}cm × ${formatDecimal(printable.printableHeightCm)}cm</div>
        <div>図の横幅</div><div>${formatDecimal(m.widthCm)}cm</div>
        <div>図の縦幅</div><div>${formatDecimal(m.heightCm)}cm</div>
        <div>辺 a</div><div>${formatDecimal(m.sideCm.a)}cm</div>
        <div>辺 b</div><div>${formatDecimal(m.sideCm.b)}cm</div>
        <div>辺 c</div><div>${formatDecimal(m.sideCm.c)}cm</div>
        <div>印刷倍率</div><div>${formatDecimal(originalModel.print.mode === 'actual' ? 1 : printModel.print.effectiveScale)} 倍</div>
      `;
    }

    function renderAll() {
      try {
        showModeFields();
        const model = computeModel();
        latestModel = model;
        renderMainBoard(model);
        if (document.getElementById('showPrintPreview').checked) {
          renderPaperBoard(model);
        }
        setStatus('正常に描画しました。');
      } catch (err) {
        setStatus(err.message || String(err));
      }
    }

    async function saveCanvasElement(elementId, type) {
      const target = document.getElementById(elementId);
      const canvas = await html2canvas(target, {
        backgroundColor: '#ffffff',
        useCORS: true,
        scale: 2
      });
      const link = document.createElement('a');
      const ext = type === 'image/jpeg' ? 'jpeg' : 'png';
      link.download = `geometry.${ext}`;
      link.href = canvas.toDataURL(type, 0.95);
      link.click();
    }

    async function savePdf() {
      const target = document.getElementById('paperPreview');
      const canvas = await html2canvas(target, {
        backgroundColor: '#ffffff',
        useCORS: true,
        scale: 2
      });
      const { jsPDF } = window.jspdf;
      const printOptions = getPrintOptions();
      const paper = PAPER_SIZES_MM[printOptions.paperSize];
      const orientation = printOptions.orientation === 'portrait' ? 'p' : 'l';
      const pdf = new jsPDF({
        orientation,
        unit: 'mm',
        format: printOptions.paperSize.toLowerCase()
      });
      let widthMm = paper.width;
      let heightMm = paper.height;
      if (orientation === 'l') [widthMm, heightMm] = [heightMm, widthMm];
      const imgData = canvas.toDataURL('image/png');
      pdf.addImage(imgData, 'PNG', 0, 0, widthMm, heightMm);
      pdf.save('geometry.pdf');
    }

    function bindEvents() {
      document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', renderAll);
        el.addEventListener('change', renderAll);
      });
      document.getElementById('btnRender').addEventListener('click', renderAll);
      document.getElementById('btnPng').addEventListener('click', () => saveCanvasElement('box', 'image/png'));
      document.getElementById('btnJpeg').addEventListener('click', () => saveCanvasElement('box', 'image/jpeg'));
      document.getElementById('btnPdf').addEventListener('click', savePdf);
    }

    bindEvents();
    renderAll();
  </script>
</body>
</html>
