<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Geometry</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    #box {
      width: 800px;
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 16px;
      background: white;
      position: relative;
      touch-action: none;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    input[type="number"] {
      width: 80px;
      padding: 6px;
    }

    input[type="range"] {
      width: 140px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    label {
      user-select: none;
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .range-value {
      min-width: 2em;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Instant Geometry</h1>
  <div>3辺を入れると三角形を描く簡易版</div>

  <div class="controls">
    <label>a <input id="a" type="number" value="3" step="0.1" min="0.1" /></label>
    <label>b <input id="b" type="number" value="4" step="0.1" min="0.1" /></label>
    <label>c <input id="c" type="number" value="5" step="0.1" min="0.1" /></label>

    <label>
      <input id="showAxes" type="checkbox" checked />
      座標軸を表示
    </label>

    <label>
      <input id="showPointCoords" type="checkbox" checked />
      点の座標を表示
    </label>

    <div class="range-wrap">
      <label for="labelSize">点名サイズ</label>
      <input id="labelSize" type="range" min="10" max="32" step="1" value="16" />
      <span id="labelSizeValue" class="range-value">16</span>
    </div>

    <button onclick="saveImage()">保存</button>
  </div>

  <div id="box" class="jxgbox"></div>

  <script>
    let board = null;
    let lastValidValues = null;

    function getInputValues() {
      return {
        a: parseFloat(document.getElementById('a').value),
        b: parseFloat(document.getElementById('b').value),
        c: parseFloat(document.getElementById('c').value),
        showAxes: document.getElementById('showAxes').checked,
        showPointCoords: document.getElementById('showPointCoords').checked,
        labelSize: parseInt(document.getElementById('labelSize').value, 10)
      };
    }

    function updateSliderLabel() {
      document.getElementById('labelSizeValue').textContent =
        document.getElementById('labelSize').value;
    }

    function isValidTriangle(a, b, c) {
      if (!(a > 0 && b > 0 && c > 0)) return false;
      if (a + b <= c || a + c <= b || b + c <= a) return false;
      return true;
    }

    function computeTriangle(a, b, c) {
      const Ax = 0;
      const Ay = 0;
      const Bx = c;
      const By = 0;

      const Cx = (b * b + c * c - a * a) / (2 * c);
      const Cy2 = b * b - Cx * Cx;

      if (Cy2 < 0) return null;

      const Cy = Math.sqrt(Cy2);

      return {
        A: { x: Ax, y: Ay },
        B: { x: Bx, y: By },
        C: { x: Cx, y: Cy }
      };
    }

    function makeSquareBoundingBox(points) {
      const xs = [points.A.x, points.B.x, points.C.x];
      const ys = [points.A.y, points.B.y, points.C.y];

      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);

      const width = Math.max(maxX - minX, 1);
      const height = Math.max(maxY - minY, 1);

      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;

      const side = Math.max(width, height) * 1.8;

      return [
        centerX - side / 2,
        centerY + side / 2,
        centerX + side / 2,
        centerY - side / 2
      ];
    }

    function pointText(name, x, y, showPointCoords) {
      if (showPointCoords) {
        return `${name}(${x.toFixed(2)}, ${y.toFixed(2)})`;
      }
      return name;
    }

    function clearBoard() {
      if (board) {
        JXG.JSXGraph.freeBoard(board);
        board = null;
      }
      document.getElementById('box').innerHTML = '';
    }

    function createAxes(showAxes) {
      if (!showAxes) return;

      board.create('axis', [[0, 0], [1, 0]], {
        withLabel: false,
        strokeWidth: 1,
        ticks: {
          drawLabels: true,
          insertTicks: true,
          ticksDistance: 1,
          minorTicks: 0,
          label: {
            offset: [0, -12]
          }
        }
      });

      board.create('axis', [[0, 0], [0, 1]], {
        withLabel: false,
        strokeWidth: 1,
        ticks: {
          drawLabels: true,
          insertTicks: true,
          ticksDistance: 1,
          minorTicks: 0,
          label: {
            offset: [-12, 0]
          }
        }
      });
    }

    function createPoint(x, y, name, labelSize) {
      return board.create('point', [x, y], {
        name: name,
        size: 3,
        fixed: true,
        withLabel: true,
        label: {
          fontSize: labelSize
        }
      });
    }

    function renderTriangle(values, preserveView = false) {
      const { a, b, c, showAxes, showPointCoords, labelSize } = values;

      if (!isValidTriangle(a, b, c)) {
        return;
      }

      const points = computeTriangle(a, b, c);
      if (!points) {
        return;
      }

      let oldBoundingBox = null;
      if (preserveView && board) {
        oldBoundingBox = board.getBoundingBox();
      }

      clearBoard();

      const bbox = oldBoundingBox || makeSquareBoundingBox(points);

      board = JXG.JSXGraph.initBoard('box', {
        boundingbox: bbox,
        axis: false,
        keepaspectratio: true,
        zoom: {
          wheel: true,
          needShift: false
        },
        pan: {
          enabled: true,
          needTwoFingers: true
        },
        showNavigation: false,
        showCopyright: false
      });

      createAxes(showAxes);

      const A = createPoint(
        points.A.x,
        points.A.y,
        pointText('A', points.A.x, points.A.y, showPointCoords),
        labelSize
      );

      const B = createPoint(
        points.B.x,
        points.B.y,
        pointText('B', points.B.x, points.B.y, showPointCoords),
        labelSize
      );

      const C = createPoint(
        points.C.x,
        points.C.y,
        pointText('C', points.C.x, points.C.y, showPointCoords),
        labelSize
      );

      board.create('polygon', [A, B, C], {
        borders: {
          strokeWidth: 2
        },
        fillColor: 'lightgray',
        fillOpacity: 0.2
      });

      board.update();
      lastValidValues = { ...values };
    }

    function autoRender(preserveView = false) {
      updateSliderLabel();

      const values = getInputValues();

      if (isValidTriangle(values.a, values.b, values.c)) {
        renderTriangle(values, preserveView);
      }
    }

    async function saveImage() {
      const box = document.getElementById('box');

      try {
        const canvas = await html2canvas(box, {
          backgroundColor: '#ffffff',
          useCORS: true,
          scale: 2
        });

        const link = document.createElement('a');
        link.download = 'geometry.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        console.error(error);
        alert('画像保存に失敗しました');
      }
    }

    function setupAutoRender() {
      const ids = ['a', 'b', 'c', 'showAxes', 'showPointCoords', 'labelSize'];

      ids.forEach((id) => {
        const el = document.getElementById(id);

        el.addEventListener('input', () => {
          const preserveView = id === 'labelSize';
          autoRender(preserveView);
        });

        el.addEventListener('change', () => {
          const preserveView = id === 'labelSize';
          autoRender(preserveView);
        });
      });
    }

    updateSliderLabel();
    setupAutoRender();
    autoRender();
  </script>
</body>
</html>
