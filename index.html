<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Geometry</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    #box {
      width: 800px;
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 16px;
      background: white;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    input[type="number"] {
      width: 80px;
      padding: 6px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    label {
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>Instant Geometry</h1>
  <div>3辺を入れると三角形を描く簡易版</div>

  <div class="controls">
    <label>a <input id="a" type="number" value="3" step="0.1" /></label>
    <label>b <input id="b" type="number" value="4" step="0.1" /></label>
    <label>c <input id="c" type="number" value="5" step="0.1" /></label>

    <label>
      <input id="showAxes" type="checkbox" checked />
      座標軸を表示
    </label>

    <label>
      <input id="showPointCoords" type="checkbox" checked />
      点の座標を表示
    </label>

    <button onclick="drawTriangle()">描画</button>
    <button onclick="saveImage()">画像保存</button>
  </div>

  <div id="box" class="jxgbox"></div>

  <script>
    let board;

    function pointLabel(name, x, y, showCoords) {
      if (showCoords) {
        return `${name}(${x.toFixed(2)}, ${y.toFixed(2)})`;
      }
      return name;
    }

    function initBoard(showAxes) {
      board = JXG.JSXGraph.initBoard('box', {
        boundingbox: [-2, 8, 8, -2],
        axis: showAxes,
        keepaspectratio: true,
        showNavigation: false,
        showCopyright: false
      });
    }

    function drawTriangle() {
      const a = parseFloat(document.getElementById('a').value);
      const b = parseFloat(document.getElementById('b').value);
      const c = parseFloat(document.getElementById('c').value);
      const showAxes = document.getElementById('showAxes').checked;
      const showPointCoords = document.getElementById('showPointCoords').checked;

      if (!(a > 0 && b > 0 && c > 0)) {
        alert('正の数を入れてください');
        return;
      }

      if (a + b <= c || a + c <= b || b + c <= a) {
        alert('三角形になりません');
        return;
      }

      if (board) {
        JXG.JSXGraph.freeBoard(board);
      }

      initBoard(showAxes);

      const Ax = 0;
      const Ay = 0;
      const Bx = c;
      const By = 0;
      const Cx = (b * b + c * c - a * a) / (2 * c);
      const Cy2 = b * b - Cx * Cx;

      if (Cy2 < 0) {
        alert('三角形を描画できません');
        return;
      }

      const Cy = Math.sqrt(Cy2);

      const A = board.create('point', [Ax, Ay], {
        name: pointLabel('A', Ax, Ay, showPointCoords),
        size: 3,
        fixed: true
      });

      const B = board.create('point', [Bx, By], {
        name: pointLabel('B', Bx, By, showPointCoords),
        size: 3,
        fixed: true
      });

      const C = board.create('point', [Cx, Cy], {
        name: pointLabel('C', Cx, Cy, showPointCoords),
        size: 3,
        fixed: true
      });

      board.create('polygon', [A, B, C], {
        borders: {
          strokeWidth: 2
        },
        fillColor: 'lightgray',
        fillOpacity: 0.2
      });

      board.update();
    }

    async function saveImage() {
      const box = document.getElementById('box');

      try {
        const canvas = await html2canvas(box, {
          backgroundColor: '#ffffff',
          useCORS: true,
          scale: 2
        });

        const link = document.createElement('a');
        link.download = 'geometry.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        console.error(error);
        alert('画像保存に失敗しました');
      }
    }

    initBoard(true);
    drawTriangle();
  </script>
</body>
</html>
