<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstantGeometry</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel-2:#1f2430;
      --line:#2a3140;
      --text:#eef2ff;
      --muted:#aeb8d0;
      --accent:#7aa2ff;
      --accent-2:#97b5ff;
      --good:#1d7f4e;
      --bad:#8f2731;
      --warn:#7e5a16;
      --white:#ffffff;
      --shadow:0 10px 30px rgba(0,0,0,0.25);
      --radius:16px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif}
    body{min-height:100vh}

    .app{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:16px;
      padding:16px;
      min-height:100vh;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .left-panel{
      padding:16px;
      overflow:auto;
    }

    .section-title{
      font-size:14px;
      color:var(--muted);
      margin:18px 0 8px 0;
      font-weight:700;
      letter-spacing:.04em;
    }

    .brand{
      font-size:22px;
      font-weight:800;
      margin-bottom:4px;
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      margin-bottom:14px;
      line-height:1.5;
    }

    .field-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.02em;
    }

    input, select, button, textarea{
      font:inherit;
    }

    input, select{
      width:100%;
      background:var(--panel-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
    }

    input:focus, select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(122,162,255,.15);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
      margin-top:2px;
    }

    .btn-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .btn-row-3{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    button{
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      border-radius:12px;
      padding:11px 12px;
      cursor:pointer;
      font-weight:700;
      transition:transform .08s ease, background .15s ease, border-color .15s ease;
    }

    button:hover{
      background:#252c3a;
      border-color:#3b4860;
    }

    button:active{
      transform:translateY(1px);
    }

    .primary{
      background:var(--accent);
      color:#08101f;
      border-color:transparent;
    }

    .primary:hover{
      background:var(--accent-2);
    }

    .right-panel{
      display:flex;
      flex-direction:column;
      min-width:0;
      padding:16px;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .topbar-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .editor-title{
      font-size:20px;
      font-weight:800;
      margin:0;
    }

    .status-box{
      min-width:260px;
      max-width:520px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #29446d;
      background:#122238;
      color:#dbe8ff;
      font-size:13px;
      line-height:1.55;
    }

    .status-box.error{
      background:#471a1f;
      border-color:#9c3340;
      color:#ffe4e7;
    }

    .status-box.success{
      background:#123426;
      border-color:#2b7f58;
      color:#ddffef;
    }

    .editor-layout{
      display:grid;
      grid-template-columns: 1fr 280px;
      gap:16px;
      min-height:0;
      flex:1;
    }

    .canvas-wrap{
      background:#11151d;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:660px;
      overflow:auto;
    }

    .canvas-inner{
      background:#fff;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
      width:min(100%, 920px);
      aspect-ratio: 4 / 3;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    #svgRoot{
      width:100%;
      height:100%;
      display:block;
      background:#fff;
    }

    .info-panel{
      background:#11151d;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      overflow:auto;
    }

    .info-block{
      margin-bottom:14px;
      padding-bottom:12px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .info-block:last-child{
      border-bottom:none;
      margin-bottom:0;
      padding-bottom:0;
    }

    .info-head{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.03em;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      border:1px solid #3b4860;
      background:#1d2330;
      color:#ebf1ff;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
    }

    .meta{
      font-size:13px;
      color:#d8e2ff;
      line-height:1.6;
      word-break:break-word;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      line-height:1.55;
    }

    .footer-note{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.55;
    }

    .hidden{
      display:none !important;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }

    @media (max-width: 1100px){
      .app{
        grid-template-columns:1fr;
      }
      .editor-layout{
        grid-template-columns:1fr;
      }
      .canvas-wrap{
        min-height:520px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel left-panel">
      <div class="brand">InstantGeometry</div>
      <div class="sub">
        図形を入力して即座に描画します。<br>
        ルート入力、画像保存、PDF保存、印刷プレビューに対応。
      </div>

      <div class="section-title">図形種別</div>
      <div class="field">
        <label for="shapeType">図形種別</label>
        <select id="shapeType">
          <option value="triangle">三角形</option>
          <option value="quadrilateral">四角形</option>
          <option value="polygon">正N角形</option>
          <option value="circle">円</option>
          <option value="ellipse">楕円</option>
        </select>
      </div>

      <div id="triangleControls">
        <div class="section-title">三角形の入力方式</div>
        <div class="field">
          <label for="triangleMode">入力方式</label>
          <select id="triangleMode">
            <option value="sss">SSS</option>
            <option value="sas">SAS</option>
            <option value="asa">ASA</option>
            <option value="aas">AAS</option>
            <option value="aaa">AAA</option>
            <option value="points">3点座標</option>
            <option value="baseheight">底辺＋高さ＋足の位置</option>
          </select>
        </div>

        <div id="triangleFields" class="field-grid"></div>
      </div>

      <div id="quadrilateralControls" class="hidden">
        <div class="section-title">四角形</div>
        <div class="field-grid" id="quadrilateralFields"></div>
      </div>

      <div id="polygonControls" class="hidden">
        <div class="section-title">正N角形</div>
        <div class="field-grid" id="polygonFields"></div>
      </div>

      <div id="circleControls" class="hidden">
        <div class="section-title">円</div>
        <div class="field-grid" id="circleFields"></div>
      </div>

      <div id="ellipseControls" class="hidden">
        <div class="section-title">楕円</div>
        <div class="field-grid" id="ellipseFields"></div>
      </div>

      <div class="section-title">印刷 / PDF</div>
      <div class="field-grid">
        <div class="field">
          <label for="paperSize">用紙</label>
          <select id="paperSize">
            <option value="A4">A4</option>
            <option value="B5">B5</option>
          </select>
        </div>
        <div class="field">
          <label for="paperOrientation">向き</label>
          <select id="paperOrientation">
            <option value="portrait">縦</option>
            <option value="landscape">横</option>
          </select>
        </div>
        <div class="field">
          <label for="fitMode">配置</label>
          <select id="fitMode">
            <option value="fit">用紙内に収める</option>
            <option value="actual">実寸</option>
          </select>
        </div>
        <div class="field">
          <label for="printWidthCm">印刷時の横幅(cm)</label>
          <input id="printWidthCm" value="12" />
        </div>
        <div class="field">
          <label for="marginLeft">左余白(mm)</label>
          <input id="marginLeft" value="12" />
        </div>
        <div class="field">
          <label for="marginRight">右余白(mm)</label>
          <input id="marginRight" value="12" />
        </div>
        <div class="field">
          <label for="marginTop">上余白(mm)</label>
          <input id="marginTop" value="12" />
        </div>
        <div class="field">
          <label for="marginBottom">下余白(mm)</label>
          <input id="marginBottom" value="12" />
        </div>
      </div>

      <div class="section-title">操作</div>
      <div class="btn-row">
        <button id="drawBtn" class="primary">描画</button>
        <button id="resetBtn">初期化</button>
      </div>
      <div class="btn-row-3">
        <button id="savePngBtn">PNG保存</button>
        <button id="saveJpegBtn">JPEG保存</button>
        <button id="savePdfBtn">PDF保存</button>
      </div>
      <div class="btn-row">
        <button id="previewBtn">印刷プレビュー</button>
        <button id="printBtn">印刷</button>
      </div>

      <div class="section-title">数式入力例</div>
      <div class="hint mono">
        3<br>
        3/2<br>
        sqrt(5)<br>
        √5<br>
        2√3<br>
        1+√2
      </div>

      <div class="footer-note">
        点ラベルは図形の外側に表示します。<br>
        三角形では辺の長さを破線の補助曲線で表示します。
      </div>
    </aside>

    <main class="panel right-panel">
      <div class="topbar">
        <div class="topbar-left">
          <h1 class="editor-title">編集画面</h1>
          <div id="statusBox" class="status-box">
            準備完了。描画できます。
          </div>
        </div>
      </div>

      <div class="editor-layout">
        <div class="canvas-wrap">
          <div class="canvas-inner">
            <svg id="svgRoot" viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg" aria-label="geometry canvas">
              <rect x="0" y="0" width="1000" height="750" fill="#ffffff"></rect>
            </svg>
          </div>
        </div>

        <aside class="info-panel">
          <div class="info-block">
            <div class="info-head">図形判定</div>
            <div id="classificationChips" class="chips"></div>
          </div>

          <div class="info-block">
            <div class="info-head">図形情報</div>
            <div id="shapeMeta" class="meta">未描画</div>
          </div>

          <div class="info-block">
            <div class="info-head">印刷情報</div>
            <div id="printMeta" class="meta">未計算</div>
          </div>

          <div class="small">
            エラー時はステータスが赤背景になります。
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    (function(){
      'use strict';

      var svg = document.getElementById('svgRoot');
      var shapeTypeEl = document.getElementById('shapeType');
      var triangleModeEl = document.getElementById('triangleMode');
      var statusBox = document.getElementById('statusBox');
      var classificationChips = document.getElementById('classificationChips');
      var shapeMeta = document.getElementById('shapeMeta');
      var printMeta = document.getElementById('printMeta');

      var triangleControls = document.getElementById('triangleControls');
      var quadrilateralControls = document.getElementById('quadrilateralControls');
      var polygonControls = document.getElementById('polygonControls');
      var circleControls = document.getElementById('circleControls');
      var ellipseControls = document.getElementById('ellipseControls');

      var triangleFields = document.getElementById('triangleFields');
      var quadrilateralFields = document.getElementById('quadrilateralFields');
      var polygonFields = document.getElementById('polygonFields');
      var circleFields = document.getElementById('circleFields');
      var ellipseFields = document.getElementById('ellipseFields');

      var state = {
        current: null
      };

      function setStatus(message, kind){
        statusBox.textContent = message;
        statusBox.classList.remove('error');
        statusBox.classList.remove('success');
        if(kind === 'error') statusBox.classList.add('error');
        if(kind === 'success') statusBox.classList.add('success');
      }

      function createField(id, labelText, value, spanFull){
        var wrap = document.createElement('div');
        wrap.className = 'field' + (spanFull ? ' full' : '');
        var label = document.createElement('label');
        label.setAttribute('for', id);
        label.textContent = labelText;
        var input = document.createElement('input');
        input.id = id;
        input.value = value;
        wrap.appendChild(label);
        wrap.appendChild(input);
        return wrap;
      }

      function createSelectField(id, labelText, options, value, spanFull){
        var wrap = document.createElement('div');
        wrap.className = 'field' + (spanFull ? ' full' : '');
        var label = document.createElement('label');
        label.setAttribute('for', id);
        label.textContent = labelText;
        var select = document.createElement('select');
        select.id = id;
        for(var i=0;i<options.length;i++){
          var opt = document.createElement('option');
          opt.value = options[i].value;
          opt.textContent = options[i].label;
          if(options[i].value === value) opt.selected = true;
          select.appendChild(opt);
        }
        wrap.appendChild(label);
        wrap.appendChild(select);
        return wrap;
      }

      function rebuildTriangleFields(){
        triangleFields.innerHTML = '';
        var mode = triangleModeEl.value;
        if(mode === 'sss'){
          triangleFields.appendChild(createField('tri_a', 'a = BC', '5'));
          triangleFields.appendChild(createField('tri_b', 'b = CA', '6'));
          triangleFields.appendChild(createField('tri_c', 'c = AB', '7'));
        }else if(mode === 'sas'){
          triangleFields.appendChild(createField('tri_b', 'b = CA', '6'));
          triangleFields.appendChild(createField('tri_c', 'c = AB', '7'));
          triangleFields.appendChild(createField('tri_A', '∠A (度)', '60', true));
        }else if(mode === 'asa'){
          triangleFields.appendChild(createField('tri_A', '∠A (度)', '50'));
          triangleFields.appendChild(createField('tri_B', '∠B (度)', '60'));
          triangleFields.appendChild(createField('tri_c', 'c = AB', '8', true));
        }else if(mode === 'aas'){
          triangleFields.appendChild(createField('tri_A', '∠A (度)', '45'));
          triangleFields.appendChild(createField('tri_B', '∠B (度)', '60'));
          triangleFields.appendChild(createField('tri_a', 'a = BC', '7', true));
        }else if(mode === 'aaa'){
          triangleFields.appendChild(createField('tri_A', '∠A (度)', '50'));
          triangleFields.appendChild(createField('tri_B', '∠B (度)', '60'));
          triangleFields.appendChild(createField('tri_C', '∠C (度)', '70'));
          triangleFields.appendChild(createField('tri_scale', '基準辺 c = AB', '8', true));
        }else if(mode === 'points'){
          triangleFields.appendChild(createField('tri_Ax', 'A.x', '0'));
          triangleFields.appendChild(createField('tri_Ay', 'A.y', '0'));
          triangleFields.appendChild(createField('tri_Bx', 'B.x', '8'));
          triangleFields.appendChild(createField('tri_By', 'B.y', '0'));
          triangleFields.appendChild(createField('tri_Cx', 'C.x', '3'));
          triangleFields.appendChild(createField('tri_Cy', 'C.y', '5'));
        }else if(mode === 'baseheight'){
          triangleFields.appendChild(createField('tri_base', '底辺 AB', '8'));
          triangleFields.appendChild(createField('tri_height', '高さ', '5'));
          triangleFields.appendChild(createField('tri_foot', '足の位置 x', '3', true));
        }
      }

      function rebuildQuadrilateralFields(){
        quadrilateralFields.innerHTML = '';
        quadrilateralFields.appendChild(createField('quad_Ax', 'A.x', '0'));
        quadrilateralFields.appendChild(createField('quad_Ay', 'A.y', '0'));
        quadrilateralFields.appendChild(createField('quad_Bx', 'B.x', '8'));
        quadrilateralFields.appendChild(createField('quad_By', 'B.y', '0'));
        quadrilateralFields.appendChild(createField('quad_Cx', 'C.x', '10'));
        quadrilateralFields.appendChild(createField('quad_Cy', 'C.y', '5'));
        quadrilateralFields.appendChild(createField('quad_Dx', 'D.x', '2'));
        quadrilateralFields.appendChild(createField('quad_Dy', 'D.y', '5'));
      }

      function rebuildPolygonFields(){
        polygonFields.innerHTML = '';
        polygonFields.appendChild(createField('poly_cx', '中心 x', '0'));
        polygonFields.appendChild(createField('poly_cy', '中心 y', '0'));
        polygonFields.appendChild(createField('poly_r', '半径', '5'));
        polygonFields.appendChild(createField('poly_n', '頂点数 N', '6'));
        polygonFields.appendChild(createField('poly_rot', '回転角 (度)', '0', true));
      }

      function rebuildCircleFields(){
        circleFields.innerHTML = '';
        circleFields.appendChild(createField('circle_cx', '中心 x', '0'));
        circleFields.appendChild(createField('circle_cy', '中心 y', '0'));
        circleFields.appendChild(createField('circle_r', '半径', '5', true));
      }

      function rebuildEllipseFields(){
        ellipseFields.innerHTML = '';
        ellipseFields.appendChild(createField('ellipse_cx', '中心 x', '0'));
        ellipseFields.appendChild(createField('ellipse_cy', '中心 y', '0'));
        ellipseFields.appendChild(createField('ellipse_rx', '長半径', '6'));
        ellipseFields.appendChild(createField('ellipse_ry', '短半径', '4'));
        ellipseFields.appendChild(createField('ellipse_rot', '回転角 (度)', '20', true));
      }

      function updateControlsVisibility(){
        var type = shapeTypeEl.value;
        triangleControls.classList.add('hidden');
        quadrilateralControls.classList.add('hidden');
        polygonControls.classList.add('hidden');
        circleControls.classList.add('hidden');
        ellipseControls.classList.add('hidden');

        if(type === 'triangle') triangleControls.classList.remove('hidden');
        if(type === 'quadrilateral') quadrilateralControls.classList.remove('hidden');
        if(type === 'polygon') polygonControls.classList.remove('hidden');
        if(type === 'circle') circleControls.classList.remove('hidden');
        if(type === 'ellipse') ellipseControls.classList.remove('hidden');
      }

      function getValue(id){
        var el = document.getElementById(id);
        if(!el) throw new Error('入力欄が見つかりません: ' + id);
        return el.value;
      }

      function tokenizeExpression(str){
        var s = String(str || '').trim();
        s = s.replace(/\s+/g, '');
        if(s === '') throw new Error('空の入力です');
        var tokens = [];
        var i = 0;
        while(i < s.length){
          var ch = s[i];

          if(/[0-9.]/.test(ch)){
            var num = ch;
            i++;
            while(i < s.length && /[0-9.]/.test(s[i])){
              num += s[i];
              i++;
            }
            if((num.match(/\./g) || []).length > 1) throw new Error('数値の形式が不正です: ' + num);
            tokens.push({type:'number', value: parseFloat(num)});
            continue;
          }

          if(ch === '√'){
            tokens.push({type:'sqrt', value:'sqrt'});
            i++;
            continue;
          }

          if(/[a-zA-Z]/.test(ch)){
            var word = ch;
            i++;
            while(i < s.length && /[a-zA-Z]/.test(s[i])){
              word += s[i];
              i++;
            }
            if(word.toLowerCase() === 'sqrt'){
              tokens.push({type:'sqrt', value:'sqrt'});
            }else{
              throw new Error('未対応の識別子です: ' + word);
            }
            continue;
          }

          if('+-*/()'.indexOf(ch) >= 0){
            tokens.push({type:ch, value:ch});
            i++;
            continue;
          }

          throw new Error('未対応の文字です: ' + ch);
        }
        return tokens;
      }

      function parseMathExpression(str){
        var tokens = tokenizeExpression(str);
        var pos = 0;

        function peek(){
          return tokens[pos] || null;
        }

        function consume(type){
          var t = tokens[pos];
          if(!t || t.type !== type) throw new Error('構文エラーです');
          pos++;
          return t;
        }

        function startsFactor(t){
          if(!t) return false;
          return t.type === 'number' || t.type === '(' || t.type === 'sqrt' || t.type === '+' || t.type === '-';
        }

        function parseExpression(){
          var value = parseTerm();
          while(true){
            var t = peek();
            if(!t) break;
            if(t.type === '+'){
              consume('+');
              value += parseTerm();
            }else if(t.type === '-'){
              consume('-');
              value -= parseTerm();
            }else{
              break;
            }
          }
          return value;
        }

        function parseTerm(){
          var value = parseFactor();
          while(true){
            var t = peek();
            if(!t) break;
            if(t.type === '*'){
              consume('*');
              value *= parseFactor();
            }else if(t.type === '/'){
              consume('/');
              var d = parseFactor();
              if(Math.abs(d) < 1e-12) throw new Error('0で割ることはできません');
              value /= d;
            }else if(startsFactor(t)){
              value *= parseFactor();
            }else{
              break;
            }
          }
          return value;
        }

        function parseFactor(){
          var t = peek();
          if(!t) throw new Error('式が途中で終わっています');

          if(t.type === '+'){
            consume('+');
            return parseFactor();
          }
          if(t.type === '-'){
            consume('-');
            return -parseFactor();
          }
          if(t.type === 'number'){
            consume('number');
            return t.value;
          }
          if(t.type === '('){
            consume('(');
            var v = parseExpression();
            consume(')');
            return v;
          }
          if(t.type === 'sqrt'){
            consume('sqrt');
            return Math.sqrt(parseFactor());
          }
          throw new Error('構文エラーです');
        }

        var result = parseExpression();
        if(pos !== tokens.length) throw new Error('式の解釈に失敗しました');
        if(!isFinite(result)) throw new Error('値が不正です');
        return result;
      }

      function rad(deg){ return deg * Math.PI / 180; }
      function deg(radValue){ return radValue * 180 / Math.PI; }

      function nearlyEqual(a,b,eps){
        return Math.abs(a-b) <= (eps || 1e-6);
      }

      function point(x,y){
        return {x:x,y:y};
      }

      function add(p,q){ return {x:p.x+q.x,y:p.y+q.y}; }
      function sub(p,q){ return {x:p.x-q.x,y:p.y-q.y}; }
      function mul(p,k){ return {x:p.x*k,y:p.y*k}; }
      function len(v){ return Math.hypot(v.x,v.y); }
      function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
      function dot(a,b){ return a.x*b.x + a.y*b.y; }
      function cross(a,b){ return a.x*b.y - a.y*b.x; }
      function normalize(v){
        var l = len(v);
        if(l < 1e-12) return {x:0,y:0};
        return {x:v.x/l,y:v.y/l};
      }
      function perp(v){ return {x:-v.y,y:v.x}; }

      function polygonSignedArea(points){
        var s = 0;
        for(var i=0;i<points.length;i++){
          var a = points[i];
          var b = points[(i+1)%points.length];
          s += a.x*b.y - a.y*b.x;
        }
        return s/2;
      }

      function isConvexPolygon(points){
        var n = points.length;
        if(n < 4) return true;
        var sign = 0;
        for(var i=0;i<n;i++){
          var a = points[i];
          var b = points[(i+1)%n];
          var c = points[(i+2)%n];
          var z = cross(sub(b,a), sub(c,b));
          if(Math.abs(z) < 1e-9) continue;
          var cur = z > 0 ? 1 : -1;
          if(sign === 0) sign = cur;
          else if(sign !== cur) return false;
        }
        return true;
      }

      function lineIntersection(p1,p2,p3,p4){
        var r = sub(p2,p1);
        var s = sub(p4,p3);
        var denom = cross(r,s);
        if(Math.abs(denom) < 1e-9) return null;
        var t = cross(sub(p3,p1), s) / denom;
        return add(p1, mul(r, t));
      }

      function safeNumber(v, name){
        var x = parseMathExpression(v);
        if(!isFinite(x)) throw new Error(name + ' が不正です');
        return x;
      }

      function triangleFromInputs(){
        var mode = triangleModeEl.value;
        var A,B,C;
        var meta = [];
        if(mode === 'sss'){
          var a = safeNumber(getValue('tri_a'), 'a');
          var b = safeNumber(getValue('tri_b'), 'b');
          var c = safeNumber(getValue('tri_c'), 'c');
          if(a<=0 || b<=0 || c<=0) throw new Error('辺の長さは正である必要があります');
          if(a+b<=c || b+c<=a || c+a<=b) throw new Error('三角形が成立しません');
          A = point(0,0);
          B = point(c,0);
          var x = (b*b + c*c - a*a) / (2*c);
          var y2 = b*b - x*x;
          if(y2 < -1e-9) throw new Error('三角形を作れません');
          var y = Math.sqrt(Math.max(0,y2));
          C = point(x,y);
          meta.push('入力: SSS');
          meta.push('a=' + formatNum(a) + ', b=' + formatNum(b) + ', c=' + formatNum(c));
        }else if(mode === 'sas'){
          var bs = safeNumber(getValue('tri_b'), 'b');
          var cs = safeNumber(getValue('tri_c'), 'c');
          var Adeg = safeNumber(getValue('tri_A'), '∠A');
          if(bs<=0 || cs<=0) throw new Error('辺の長さは正である必要があります');
          if(Adeg<=0 || Adeg>=180) throw new Error('角度は 0 < 角 < 180 を満たす必要があります');
          A = point(0,0);
          B = point(cs,0);
          C = point(bs*Math.cos(rad(Adeg)), bs*Math.sin(rad(Adeg)));
          meta.push('入力: SAS');
          meta.push('b=' + formatNum(bs) + ', c=' + formatNum(cs) + ', ∠A=' + formatNum(Adeg) + '°');
        }else if(mode === 'asa'){
          var A1 = safeNumber(getValue('tri_A'), '∠A');
          var B1 = safeNumber(getValue('tri_B'), '∠B');
          var c1 = safeNumber(getValue('tri_c'), 'c');
          var C1 = 180 - A1 - B1;
          if(c1<=0) throw new Error('辺の長さは正である必要があります');
          if(A1<=0 || B1<=0 || C1<=0) throw new Error('角度の合計が不正です');
          var a1 = c1 * Math.sin(rad(A1)) / Math.sin(rad(C1));
          var b1 = c1 * Math.sin(rad(B1)) / Math.sin(rad(C1));
          A = point(0,0);
          B = point(c1,0);
          C = point(b1*Math.cos(rad(A1)), b1*Math.sin(rad(A1)));
          meta.push('入力: ASA');
          meta.push('∠A=' + formatNum(A1) + '°, ∠B=' + formatNum(B1) + '°, c=' + formatNum(c1));
        }else if(mode === 'aas'){
          var A2 = safeNumber(getValue('tri_A'), '∠A');
          var B2 = safeNumber(getValue('tri_B'), '∠B');
          var a2 = safeNumber(getValue('tri_a'), 'a');
          var C2 = 180 - A2 - B2;
          if(a2<=0) throw new Error('辺の長さは正である必要があります');
          if(A2<=0 || B2<=0 || C2<=0) throw new Error('角度の合計が不正です');
          var c2 = a2 * Math.sin(rad(C2)) / Math.sin(rad(A2));
          var b2 = a2 * Math.sin(rad(B2)) / Math.sin(rad(A2));
          A = point(0,0);
          B = point(c2,0);
          C = point(b2*Math.cos(rad(A2)), b2*Math.sin(rad(A2)));
          meta.push('入力: AAS');
          meta.push('∠A=' + formatNum(A2) + '°, ∠B=' + formatNum(B2) + '°, a=' + formatNum(a2));
        }else if(mode === 'aaa'){
          var A3 = safeNumber(getValue('tri_A'), '∠A');
          var B3 = safeNumber(getValue('tri_B'), '∠B');
          var C3 = safeNumber(getValue('tri_C'), '∠C');
          var scale = safeNumber(getValue('tri_scale'), '基準辺');
          if(scale<=0) throw new Error('基準辺は正である必要があります');
          if(Math.abs((A3+B3+C3)-180) > 1e-6) throw new Error('AAA では角度の合計が180°である必要があります');
          if(A3<=0 || B3<=0 || C3<=0) throw new Error('角度はすべて正である必要があります');
          var a3 = scale * Math.sin(rad(A3)) / Math.sin(rad(C3));
          var b3 = scale * Math.sin(rad(B3)) / Math.sin(rad(C3));
          A = point(0,0);
          B = point(scale,0);
          C = point(b3*Math.cos(rad(A3)), b3*Math.sin(rad(A3)));
          meta.push('入力: AAA');
          meta.push('∠A=' + formatNum(A3) + '°, ∠B=' + formatNum(B3) + '°, ∠C=' + formatNum(C3) + '°, c=' + formatNum(scale));
        }else if(mode === 'points'){
          A = point(safeNumber(getValue('tri_Ax'),'A.x'), safeNumber(getValue('tri_Ay'),'A.y'));
          B = point(safeNumber(getValue('tri_Bx'),'B.x'), safeNumber(getValue('tri_By'),'B.y'));
          C = point(safeNumber(getValue('tri_Cx'),'C.x'), safeNumber(getValue('tri_Cy'),'C.y'));
          meta.push('入力: 3点座標');
        }else if(mode === 'baseheight'){
          var base = safeNumber(getValue('tri_base'),'底辺');
          var height = safeNumber(getValue('tri_height'),'高さ');
          var foot = safeNumber(getValue('tri_foot'),'足の位置');
          if(base<=0) throw new Error('底辺は正である必要があります');
          A = point(0,0);
          B = point(base,0);
          C = point(foot,height);
          meta.push('入力: 底辺＋高さ＋足の位置');
          meta.push('AB=' + formatNum(base) + ', 高さ=' + formatNum(height) + ', 足=' + formatNum(foot));
        }else{
          throw new Error('未対応の三角形モードです');
        }

        if(Math.abs(cross(sub(B,A), sub(C,A))) < 1e-9) throw new Error('3点が一直線上にあり、三角形が成立しません');

        return {
          type:'triangle',
          points:[A,B,C],
          labels:['A','B','C'],
          meta:meta
        };
      }

      function quadrilateralFromInputs(){
        var A = point(safeNumber(getValue('quad_Ax'),'A.x'), safeNumber(getValue('quad_Ay'),'A.y'));
        var B = point(safeNumber(getValue('quad_Bx'),'B.x'), safeNumber(getValue('quad_By'),'B.y'));
        var C = point(safeNumber(getValue('quad_Cx'),'C.x'), safeNumber(getValue('quad_Cy'),'C.y'));
        var D = point(safeNumber(getValue('quad_Dx'),'D.x'), safeNumber(getValue('quad_Dy'),'D.y'));

        var points = [A,B,C,D];
        var area = polygonSignedArea(points);
        if(Math.abs(area) < 1e-9) throw new Error('四角形の面積が 0 です');
        return {
          type:'quadrilateral',
          points:points,
          labels:['A','B','C','D'],
          meta:['入力: 4点座標']
        };
      }

      function polygonFromInputs(){
        var cx = safeNumber(getValue('poly_cx'),'中心 x');
        var cy = safeNumber(getValue('poly_cy'),'中心 y');
        var r = safeNumber(getValue('poly_r'),'半径');
        var n = Math.round(safeNumber(getValue('poly_n'),'N'));
        var rot = safeNumber(getValue('poly_rot'),'回転角');
        if(r <= 0) throw new Error('半径は正である必要があります');
        if(n < 3) throw new Error('N は 3 以上である必要があります');
        var pts = [];
        for(var i=0;i<n;i++){
          var ang = rad(rot) + i * 2*Math.PI / n - Math.PI/2;
          pts.push(point(cx + r*Math.cos(ang), cy + r*Math.sin(ang)));
        }
        var labels = [];
        for(var j=0;j<n;j++) labels.push(String.fromCharCode(65 + (j % 26)));
        return {
          type:'polygon',
          points:pts,
          center:point(cx,cy),
          radius:r,
          n:n,
          rotation:rot,
          labels:labels,
          meta:['入力: 正N角形', '中心=(' + formatNum(cx) + ', ' + formatNum(cy) + '), 半径=' + formatNum(r) + ', N=' + n + ', 回転=' + formatNum(rot) + '°']
        };
      }

      function circleFromInputs(){
        var cx = safeNumber(getValue('circle_cx'),'中心 x');
        var cy = safeNumber(getValue('circle_cy'),'中心 y');
        var r = safeNumber(getValue('circle_r'),'半径');
        if(r <= 0) throw new Error('半径は正である必要があります');
        return {
          type:'circle',
          center:point(cx,cy),
          radius:r,
          meta:['入力: 円', '中心=(' + formatNum(cx) + ', ' + formatNum(cy) + '), 半径=' + formatNum(r)]
        };
      }

      function ellipseFromInputs(){
        var cx = safeNumber(getValue('ellipse_cx'),'中心 x');
        var cy = safeNumber(getValue('ellipse_cy'),'中心 y');
        var rx = safeNumber(getValue('ellipse_rx'),'長半径');
        var ry = safeNumber(getValue('ellipse_ry'),'短半径');
        var rot = safeNumber(getValue('ellipse_rot'),'回転角');
        if(rx <= 0 || ry <= 0) throw new Error('半径は正である必要があります');
        return {
          type:'ellipse',
          center:point(cx,cy),
          rx:rx,
          ry:ry,
          rotation:rot,
          meta:['入力: 楕円', '中心=(' + formatNum(cx) + ', ' + formatNum(cy) + '), 長半径=' + formatNum(rx) + ', 短半径=' + formatNum(ry) + ', 回転=' + formatNum(rot) + '°']
        };
      }

      function getShapeData(){
        var type = shapeTypeEl.value;
        if(type === 'triangle') return triangleFromInputs();
        if(type === 'quadrilateral') return quadrilateralFromInputs();
        if(type === 'polygon') return polygonFromInputs();
        if(type === 'circle') return circleFromInputs();
        if(type === 'ellipse') return ellipseFromInputs();
        throw new Error('未対応の図形種別です');
      }

      function getBoundsForShape(shape){
        if(shape.type === 'circle'){
          return {
            minX: shape.center.x - shape.radius,
            maxX: shape.center.x + shape.radius,
            minY: shape.center.y - shape.radius,
            maxY: shape.center.y + shape.radius
          };
        }
        if(shape.type === 'ellipse'){
          var t = rad(shape.rotation);
          var wx = Math.sqrt(shape.rx*shape.rx*Math.cos(t)*Math.cos(t) + shape.ry*shape.ry*Math.sin(t)*Math.sin(t));
          var hy = Math.sqrt(shape.rx*shape.rx*Math.sin(t)*Math.sin(t) + shape.ry*shape.ry*Math.cos(t)*Math.cos(t));
          return {
            minX: shape.center.x - wx,
            maxX: shape.center.x + wx,
            minY: shape.center.y - hy,
            maxY: shape.center.y + hy
          };
        }
        var pts = shape.points;
        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for(var i=0;i<pts.length;i++){
          minX = Math.min(minX, pts[i].x);
          minY = Math.min(minY, pts[i].y);
          maxX = Math.max(maxX, pts[i].x);
          maxY = Math.max(maxY, pts[i].y);
        }
        return {minX:minX,minY:minY,maxX:maxX,maxY:maxY};
      }

      function transformForShape(shape){
        var bounds = getBoundsForShape(shape);
        var margin = 70;
        var width = 1000;
        var height = 750;
        var bw = Math.max(1e-6, bounds.maxX - bounds.minX);
        var bh = Math.max(1e-6, bounds.maxY - bounds.minY);
        var scale = Math.min((width - 2*margin)/bw, (height - 2*margin)/bh);
        if(!isFinite(scale) || scale <= 0) scale = 40;

        function mapPoint(p){
          return {
            x: (p.x - bounds.minX) * scale + (width - bw*scale)/2,
            y: height - ((p.y - bounds.minY) * scale + (height - bh*scale)/2)
          };
        }

        return {
          scale: scale,
          mapPoint: mapPoint,
          width: width,
          height: height,
          bounds: bounds
        };
      }

      function clearSvg(){
        while(svg.firstChild) svg.removeChild(svg.firstChild);
        var bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('x', '0');
        bg.setAttribute('y', '0');
        bg.setAttribute('width', '1000');
        bg.setAttribute('height', '750');
        bg.setAttribute('fill', '#ffffff');
        svg.appendChild(bg);
      }

      function makeSvg(tag, attrs){
        var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
        for(var k in attrs){
          if(Object.prototype.hasOwnProperty.call(attrs, k)){
            el.setAttribute(k, String(attrs[k]));
          }
        }
        return el;
      }

      function drawLabel(text, position){
        var t = makeSvg('text', {
          x: position.x,
          y: position.y,
          'font-size': 24,
          'font-weight': 700,
          fill: '#111827',
          'text-anchor': 'middle',
          'dominant-baseline': 'middle'
        });
        t.textContent = text;
        svg.appendChild(t);
      }

      function labelPositionForVertex(mappedPts, index){
        var p = mappedPts[index];
        var cx = 0, cy = 0;
        for(var i=0;i<mappedPts.length;i++){
          cx += mappedPts[i].x;
          cy += mappedPts[i].y;
        }
        cx /= mappedPts.length;
        cy /= mappedPts.length;
        var away = normalize({x:p.x-cx, y:p.y-cy});
        if(len(away) < 1e-9) away = {x:0,y:-1};
        return {
          x: p.x + away.x * 28,
          y: p.y + away.y * 28
        };
      }

      function drawTriangleSideDimensions(mappedPts, originalPts){
        var pairs = [
          [1,2,'a'],
          [2,0,'b'],
          [0,1,'c']
        ];
        var centroid = {
          x:(mappedPts[0].x + mappedPts[1].x + mappedPts[2].x)/3,
          y:(mappedPts[0].y + mappedPts[1].y + mappedPts[2].y)/3
        };

        for(var i=0;i<pairs.length;i++){
          var i1 = pairs[i][0], i2 = pairs[i][1];
          var p1 = mappedPts[i1], p2 = mappedPts[i2];
          var mid = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
          var edge = sub(p2,p1);
          var n = normalize(perp(edge));
          var toCenter = sub(centroid, mid);
          if(dot(n, toCenter) > 0) n = mul(n, -1);
          var offset = 26;

          var c1 = add(p1, mul(n, offset));
          var c2 = add(p2, mul(n, offset));

          var pathData = 'M ' + p1.x + ' ' + p1.y + ' Q ' + mid.x + ' ' + mid.y + ' ' + p2.x + ' ' + p2.y;
          var guideData = 'M ' + c1.x + ' ' + c1.y + ' Q ' + (mid.x + n.x*offset) + ' ' + (mid.y + n.y*offset) + ' ' + c2.x + ' ' + c2.y;

          var guide = makeSvg('path', {
            d: guideData,
            fill: 'none',
            stroke: '#8094c6',
            'stroke-width': 2,
            'stroke-dasharray': '8 6'
          });
          svg.appendChild(guide);

          var lengthText = formatNum(dist(originalPts[i1], originalPts[i2]));
          var tx = mid.x + n.x*(offset + 18);
          var ty = mid.y + n.y*(offset + 18);
          var textBg = makeSvg('rect', {
            x: tx - 20,
            y: ty - 12,
            width: 40,
            height: 24,
            rx: 10,
            fill: '#ffffff',
            stroke: '#d6ddf0'
          });
          svg.appendChild(textBg);

          var text = makeSvg('text', {
            x: tx,
            y: ty,
            'font-size': 18,
            fill: '#51627d',
            'text-anchor': 'middle',
            'dominant-baseline': 'middle',
            'font-weight': 700
          });
          text.textContent = lengthText;
          svg.appendChild(text);
        }
      }

      function drawCenterPoint(mappedCenter){
        var c = makeSvg('circle', {
          cx: mappedCenter.x,
          cy: mappedCenter.y,
          r: 4,
          fill: '#1f4fd8'
        });
        svg.appendChild(c);
      }

      function renderShape(shape){
        clearSvg();
        var t = transformForShape(shape);
        var mappedPts, poly;

        if(shape.type === 'triangle' || shape.type === 'quadrilateral' || shape.type === 'polygon'){
          mappedPts = shape.points.map(t.mapPoint);

          poly = makeSvg('polygon', {
            points: mappedPts.map(function(p){ return p.x + ',' + p.y; }).join(' '),
            fill: 'rgba(122,162,255,0.14)',
            stroke: '#111827',
            'stroke-width': 3,
            'stroke-linejoin': 'round'
          });
          svg.appendChild(poly);

          if(shape.type === 'triangle'){
            drawTriangleSideDimensions(mappedPts, shape.points);
          }

          for(var i=0;i<mappedPts.length;i++){
            var dotPt = makeSvg('circle', {
              cx: mappedPts[i].x,
              cy: mappedPts[i].y,
              r: 4,
              fill: '#111827'
            });
            svg.appendChild(dotPt);
          }

          for(var j=0;j<mappedPts.length;j++){
            drawLabel(shape.labels[j], labelPositionForVertex(mappedPts, j));
          }
        }else if(shape.type === 'circle'){
          var center = t.mapPoint(shape.center);
          var screenR = shape.radius * t.scale;
          var circle = makeSvg('circle', {
            cx: center.x,
            cy: center.y,
            r: screenR,
            fill: 'rgba(122,162,255,0.14)',
            stroke: '#111827',
            'stroke-width': 3
          });
          svg.appendChild(circle);

          var radiusLine = makeSvg('line', {
            x1: center.x,
            y1: center.y,
            x2: center.x + screenR,
            y2: center.y,
            stroke: '#8094c6',
            'stroke-width': 2,
            'stroke-dasharray': '8 6'
          });
          svg.appendChild(radiusLine);

          drawCenterPoint(center);
          drawLabel('O', {x:center.x - 22, y:center.y - 22});

          var text = makeSvg('text', {
            x: center.x + screenR/2,
            y: center.y - 14,
            'font-size': 18,
            fill: '#51627d',
            'text-anchor': 'middle',
            'font-weight': 700
          });
          text.textContent = 'r=' + formatNum(shape.radius);
          svg.appendChild(text);
        }else if(shape.type === 'ellipse'){
          var centerE = t.mapPoint(shape.center);
          var rx = shape.rx * t.scale;
          var ry = shape.ry * t.scale;
          var ell = makeSvg('ellipse', {
            cx: centerE.x,
            cy: centerE.y,
            rx: rx,
            ry: ry,
            fill: 'rgba(122,162,255,0.14)',
            stroke: '#111827',
            'stroke-width': 3,
            transform: 'rotate(' + (-shape.rotation) + ' ' + centerE.x + ' ' + centerE.y + ')'
          });
          svg.appendChild(ell);

          drawCenterPoint(centerE);
          drawLabel('O', {x:centerE.x - 24, y:centerE.y - 24});

          var rotRad = rad(shape.rotation);
          var majorEnd = {
            x: centerE.x + rx * Math.cos(rotRad),
            y: centerE.y - rx * Math.sin(rotRad)
          };
          var minorEnd = {
            x: centerE.x - ry * Math.sin(rotRad),
            y: centerE.y - ry * Math.cos(rotRad)
          };

          svg.appendChild(makeSvg('line', {
            x1:centerE.x, y1:centerE.y, x2:majorEnd.x, y2:majorEnd.y,
            stroke:'#8094c6','stroke-width':2,'stroke-dasharray':'8 6'
          }));
          svg.appendChild(makeSvg('line', {
            x1:centerE.x, y1:centerE.y, x2:minorEnd.x, y2:minorEnd.y,
            stroke:'#8094c6','stroke-width':2,'stroke-dasharray':'8 6'
          }));

          var txt1 = makeSvg('text', {
            x:(centerE.x + majorEnd.x)/2,
            y:(centerE.y + majorEnd.y)/2 - 8,
            'font-size':18,
            fill:'#51627d',
            'text-anchor':'middle',
            'font-weight':700
          });
          txt1.textContent = 'a=' + formatNum(shape.rx);
          svg.appendChild(txt1);

          var txt2 = makeSvg('text', {
            x:(centerE.x + minorEnd.x)/2,
            y:(centerE.y + minorEnd.y)/2 - 8,
            'font-size':18,
            fill:'#51627d',
            'text-anchor':'middle',
            'font-weight':700
          });
          txt2.textContent = 'b=' + formatNum(shape.ry);
          svg.appendChild(txt2);
        }
      }

      function triangleClassifications(points){
        var A = points[0], B = points[1], C = points[2];
        var a = dist(B,C);
        var b = dist(C,A);
        var c = dist(A,B);
        var cls = [];

        if(nearlyEqual(a,b) || nearlyEqual(b,c) || nearlyEqual(c,a)) cls.push('二等辺三角形');
        if(nearlyEqual(a,b) && nearlyEqual(b,c)) cls.push('正三角形');

        var arr = [a*a,b*b,c*c].sort(function(x,y){ return x-y; });
        var s1 = arr[0], s2 = arr[1], s3 = arr[2];
        if(nearlyEqual(s1+s2, s3, 1e-5)) cls.push('直角三角形');
        else if(s1+s2 > s3) cls.push('鋭角三角形');
        else cls.push('鈍角三角形');

        return cls;
      }

      function quadrilateralClassifications(points){
        var A=points[0], B=points[1], C=points[2], D=points[3];
        var AB=sub(B,A), BC=sub(C,B), CD=sub(D,C), DA=sub(A,D);
        var lenAB=len(AB), lenBC=len(BC), lenCD=len(CD), lenDA=len(DA);
        var cls = [];

        var convex = isConvexPolygon(points);
        cls.push(convex ? '凸四角形' : '凹四角形');

        var ab_cd_parallel = Math.abs(cross(AB, CD)) < 1e-6;
        var bc_da_parallel = Math.abs(cross(BC, DA)) < 1e-6;
        var angleB90 = Math.abs(dot(AB, BC)) < 1e-6;
        var allSidesEqual = nearlyEqual(lenAB,lenBC,1e-5) && nearlyEqual(lenBC,lenCD,1e-5) && nearlyEqual(lenCD,lenDA,1e-5);

        if(ab_cd_parallel && bc_da_parallel) cls.push('平行四辺形');
        if(ab_cd_parallel && bc_da_parallel && angleB90) cls.push('長方形');
        if(ab_cd_parallel && bc_da_parallel && allSidesEqual) cls.push('菱形');
        if(ab_cd_parallel && bc_da_parallel && angleB90 && allSidesEqual) cls.push('正方形');

        var isTrapezoid = (ab_cd_parallel && !bc_da_parallel) || (!ab_cd_parallel && bc_da_parallel);
        if(isTrapezoid) cls.push('台形');

        if(isTrapezoid){
          var nonParallel1, nonParallel2;
          if(ab_cd_parallel && !bc_da_parallel){
            nonParallel1 = lenBC;
            nonParallel2 = lenDA;
          }else{
            nonParallel1 = lenAB;
            nonParallel2 = lenCD;
          }
          if(nearlyEqual(nonParallel1, nonParallel2, 1e-5)) cls.push('等脚台形');
        }

        return cls;
      }

      function classificationsForShape(shape){
        if(shape.type === 'triangle') return triangleClassifications(shape.points);
        if(shape.type === 'quadrilateral') return quadrilateralClassifications(shape.points);
        if(shape.type === 'polygon') return ['正' + shape.n + '角形'];
        if(shape.type === 'circle') return ['円'];
        if(shape.type === 'ellipse') return ['楕円'];
        return [];
      }

      function updateClassifications(chips){
        classificationChips.innerHTML = '';
        if(!chips || !chips.length){
          var span = document.createElement('div');
          span.className = 'small';
          span.textContent = '判定なし';
          classificationChips.appendChild(span);
          return;
        }
        for(var i=0;i<chips.length;i++){
          var chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = chips[i];
          classificationChips.appendChild(chip);
        }
      }

      function formatNum(x){
        if(!isFinite(x)) return String(x);
        if(Math.abs(x) < 1e-12) x = 0;
        var s = x.toFixed(6);
        s = s.replace(/\.?0+$/,'');
        return s;
      }

      function shapeMetaText(shape){
        var lines = [];
        if(shape.meta && shape.meta.length){
          for(var i=0;i<shape.meta.length;i++) lines.push(shape.meta[i]);
        }

        if(shape.type === 'triangle' || shape.type === 'quadrilateral' || shape.type === 'polygon'){
          for(var j=0;j<shape.points.length;j++){
            lines.push(shape.labels[j] + ' = (' + formatNum(shape.points[j].x) + ', ' + formatNum(shape.points[j].y) + ')');
          }
        }else if(shape.type === 'circle'){
          lines.push('中心 = (' + formatNum(shape.center.x) + ', ' + formatNum(shape.center.y) + ')');
          lines.push('半径 = ' + formatNum(shape.radius));
        }else if(shape.type === 'ellipse'){
          lines.push('中心 = (' + formatNum(shape.center.x) + ', ' + formatNum(shape.center.y) + ')');
          lines.push('長半径 = ' + formatNum(shape.rx));
          lines.push('短半径 = ' + formatNum(shape.ry));
          lines.push('回転角 = ' + formatNum(shape.rotation) + '°');
        }

        if(shape.type === 'triangle'){
          var a = dist(shape.points[1], shape.points[2]);
          var b = dist(shape.points[2], shape.points[0]);
          var c = dist(shape.points[0], shape.points[1]);
          var area = Math.abs(cross(sub(shape.points[1], shape.points[0]), sub(shape.points[2], shape.points[0]))) / 2;
          lines.push('a = BC = ' + formatNum(a));
          lines.push('b = CA = ' + formatNum(b));
          lines.push('c = AB = ' + formatNum(c));
          lines.push('面積 = ' + formatNum(area));
        }

        if(shape.type === 'quadrilateral'){
          var areaQ = Math.abs(polygonSignedArea(shape.points));
          lines.push('面積 = ' + formatNum(areaQ));
        }

        if(shape.type === 'polygon'){
          var side = dist(shape.points[0], shape.points[1]);
          lines.push('1辺 = ' + formatNum(side));
        }

        if(shape.type === 'circle'){
          lines.push('面積 = ' + formatNum(Math.PI * shape.radius * shape.radius));
        }

        if(shape.type === 'ellipse'){
          lines.push('面積 = ' + formatNum(Math.PI * shape.rx * shape.ry));
        }

        return lines.join('<br>');
      }

      function getPaperDimensionsMm(){
        var size = document.getElementById('paperSize').value;
        var orientation = document.getElementById('paperOrientation').value;
        var w,h;
        if(size === 'A4'){
          w = 210; h = 297;
        }else{
          w = 182; h = 257;
        }
        if(orientation === 'landscape'){
          var tmp = w; w = h; h = tmp;
        }
        return {widthMm:w, heightMm:h, size:size, orientation:orientation};
      }

      function getPrintConfig(){
        var paper = getPaperDimensionsMm();
        var marginLeft = safeNumber(getValue('marginLeft'), '左余白');
        var marginRight = safeNumber(getValue('marginRight'), '右余白');
        var marginTop = safeNumber(getValue('marginTop'), '上余白');
        var marginBottom = safeNumber(getValue('marginBottom'), '下余白');
        var printWidthCm = safeNumber(getValue('printWidthCm'), '印刷時の横幅');
        var fitMode = document.getElementById('fitMode').value;

        if(marginLeft < 0 || marginRight < 0 || marginTop < 0 || marginBottom < 0) throw new Error('余白は 0 以上で指定してください');
        if(printWidthCm <= 0) throw new Error('印刷時の横幅は正である必要があります');

        var printableW = paper.widthMm - marginLeft - marginRight;
        var printableH = paper.heightMm - marginTop - marginBottom;
        if(printableW <= 0 || printableH <= 0) throw new Error('余白が大きすぎて印刷領域がありません');

        var aspect = 1000 / 750;
        var targetWmm = printWidthCm * 10;
        var targetHmm = targetWmm / aspect;

        var actualW = targetWmm;
        var actualH = targetHmm;

        if(fitMode === 'fit'){
          var scale = Math.min(printableW / targetWmm, printableH / targetHmm, 1);
          actualW = targetWmm * scale;
          actualH = targetHmm * scale;
        }

        return {
          paper: paper,
          marginLeft: marginLeft,
          marginRight: marginRight,
          marginTop: marginTop,
          marginBottom: marginBottom,
          printableW: printableW,
          printableH: printableH,
          fitMode: fitMode,
          requestedWmm: targetWmm,
          requestedHmm: targetHmm,
          actualWmm: actualW,
          actualHmm: actualH
        };
      }

      function updatePrintMeta(){
        try{
          var p = getPrintConfig();
          printMeta.innerHTML =
            '用紙 = ' + p.paper.size + ' / ' + (p.paper.orientation === 'portrait' ? '縦' : '横') + '<br>' +
            '余白 = 左' + formatNum(p.marginLeft) + ' 右' + formatNum(p.marginRight) + ' 上' + formatNum(p.marginTop) + ' 下' + formatNum(p.marginBottom) + ' mm<br>' +
            '配置 = ' + (p.fitMode === 'fit' ? '用紙内に収める' : '実寸') + '<br>' +
            '印刷時サイズ = ' + formatNum(p.actualWmm / 10) + ' cm × ' + formatNum(p.actualHmm / 10) + ' cm';
        }catch(err){
          printMeta.innerHTML = '印刷設定エラー: ' + escapeHtml(err.message);
        }
      }

      function escapeHtml(s){
        return String(s)
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;')
          .replace(/'/g,'&#39;');
      }

      function draw(){
        try{
          var shape = getShapeData();
          renderShape(shape);
          state.current = shape;
          updateClassifications(classificationsForShape(shape));
          shapeMeta.innerHTML = shapeMetaText(shape);
          updatePrintMeta();
          setStatus('描画成功。', 'success');
        }catch(err){
          setStatus(err.message, 'error');
          state.current = null;
          updateClassifications([]);
          shapeMeta.innerHTML = 'エラー';
        }
      }

      function resetAll(){
        shapeTypeEl.value = 'triangle';
        triangleModeEl.value = 'sss';
        rebuildTriangleFields();
        rebuildQuadrilateralFields();
        rebuildPolygonFields();
        rebuildCircleFields();
        rebuildEllipseFields();
        document.getElementById('paperSize').value = 'A4';
        document.getElementById('paperOrientation').value = 'portrait';
        document.getElementById('fitMode').value = 'fit';
        document.getElementById('printWidthCm').value = '12';
        document.getElementById('marginLeft').value = '12';
        document.getElementById('marginRight').value = '12';
        document.getElementById('marginTop').value = '12';
        document.getElementById('marginBottom').value = '12';
        updateControlsVisibility();
        clearSvg();
        state.current = null;
        updateClassifications([]);
        shapeMeta.innerHTML = '未描画';
        updatePrintMeta();
        setStatus('準備完了。描画できます。');
      }

      function svgToDataUrl(){
        var serializer = new XMLSerializer();
        var source = serializer.serializeToString(svg);
        return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(source);
      }

      function svgToCanvas(callback, jpegBackground){
        var img = new Image();
        img.onload = function(){
          var canvas = document.createElement('canvas');
          canvas.width = 2000;
          canvas.height = 1500;
          var ctx = canvas.getContext('2d');
          if(jpegBackground){
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0,0,canvas.width,canvas.height);
          }else{
            ctx.clearRect(0,0,canvas.width,canvas.height);
          }
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          callback(canvas);
        };
        img.onerror = function(){
          setStatus('画像変換に失敗しました', 'error');
        };
        img.src = svgToDataUrl();
      }

      function downloadBlob(blob, filename){
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      }

      function savePng(){
        if(!state.current) draw();
        if(!state.current) return;
        svgToCanvas(function(canvas){
          canvas.toBlob(function(blob){
            if(blob) downloadBlob(blob, 'instantgeometry.png');
          }, 'image/png');
        }, false);
      }

      function saveJpeg(){
        if(!state.current) draw();
        if(!state.current) return;
        svgToCanvas(function(canvas){
          canvas.toBlob(function(blob){
            if(blob) downloadBlob(blob, 'instantgeometry.jpg');
          }, 'image/jpeg', 0.95);
        }, true);
      }

      function buildPreviewHtml(svgMarkupEscaped, conf){
        var scalePx = 3.2;
        var paperW = conf.paper.widthMm * scalePx;
        var paperH = conf.paper.heightMm * scalePx;
        var innerLeft = conf.marginLeft * scalePx;
        var innerTop = conf.marginTop * scalePx;
        var innerW = conf.printableW * scalePx;
        var innerH = conf.printableH * scalePx;

        var drawW = conf.actualWmm * scalePx;
        var drawH = conf.actualHmm * scalePx;
        var drawX = innerLeft + (innerW - drawW)/2;
        var drawY = innerTop + (innerH - drawH)/2;

        var infoText =
          '用紙: ' + conf.paper.size + ' / ' + (conf.paper.orientation === 'portrait' ? '縦' : '横') +
          '　余白(mm): 左' + formatNum(conf.marginLeft) + ' 右' + formatNum(conf.marginRight) + ' 上' + formatNum(conf.marginTop) + ' 下' + formatNum(conf.marginBottom) +
          '　図形サイズ: ' + formatNum(conf.actualWmm/10) + 'cm × ' + formatNum(conf.actualHmm/10) + 'cm';

        var html = '';
        html += '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">';
        html += '<title>印刷プレビュー</title>';
        html += '<style>';
        html += 'html,body{margin:0;padding:0;background:#f3f5f9;color:#111827;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Noto Sans JP,sans-serif}';
        html += '.wrap{padding:20px}';
        html += '.bar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}';
        html += '.info{font-size:13px;line-height:1.5;color:#334155}';
        html += '.btns{display:flex;gap:8px;flex-wrap:wrap}';
        html += 'button{font:inherit;border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:700}';
        html += '.paper{position:relative;margin:0 auto;background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.16);width:' + paperW + 'px;height:' + paperH + 'px}';
        html += '.inner{position:absolute;left:' + innerLeft + 'px;top:' + innerTop + 'px;width:' + innerW + 'px;height:' + innerH + 'px;border:1px dashed #cbd5e1}';
        html += '.drawing{position:absolute;left:' + drawX + 'px;top:' + drawY + 'px;width:' + drawW + 'px;height:' + drawH + 'px;background:#fff}';
        html += '.drawing svg{width:100%;height:100%;display:block;background:#fff}';
        html += '@page{size:' + conf.paper.size + ' ' + conf.paper.orientation + ';margin:0}';
        html += '@media print{body{background:#fff}.wrap{padding:0}.bar{display:none}.paper{box-shadow:none}.inner{border:none}}';
        html += '</style></head><body>';
        html += '<div class="wrap">';
        html += '<div class="bar">';
        html += '<div class="info">' + escapeHtml(infoText) + '</div>';
        html += '<div class="btns"><button onclick="window.print()">印刷</button><button onclick="window.close()">閉じる</button></div>';
        html += '</div>';
        html += '<div class="paper">';
        html += '<div class="inner"></div>';
        html += '<div class="drawing">' + svgMarkupEscaped + '</div>';
        html += '</div>';
        html += '</div>';
        html += '</body></html>';
        return html;
      }

      function openPrintPreview(doPrint){
        try{
          if(!state.current) draw();
          if(!state.current) return;
          var conf = getPrintConfig();
          var serializer = new XMLSerializer();
          var markup = serializer.serializeToString(svg);
          var win = window.open('', '_blank', 'noopener,noreferrer,width=1100,height=900');
          if(!win){
            setStatus('プレビューウィンドウを開けませんでした', 'error');
            return;
          }
          var html = buildPreviewHtml(markup, conf);
          win.document.open();
          win.document.write(html);
          win.document.close();
          if(doPrint){
            win.onload = function(){
              setTimeout(function(){ win.print(); }, 200);
            };
          }
        }catch(err){
          setStatus(err.message, 'error');
        }
      }

      function savePdf(){
        try{
          if(!state.current) draw();
          if(!state.current) return;
          var conf = getPrintConfig();
          svgToCanvas(function(canvas){
            var jspdf = window.jspdf;
            if(!jspdf || !jspdf.jsPDF){
              setStatus('jsPDF の読み込みに失敗しました', 'error');
              return;
            }
            var doc = new jspdf.jsPDF({
              orientation: conf.paper.orientation === 'portrait' ? 'p' : 'l',
              unit: 'mm',
              format: conf.paper.size
            });

            var imgData = canvas.toDataURL('image/png');
            var x = conf.marginLeft + (conf.printableW - conf.actualWmm)/2;
            var y = conf.marginTop + (conf.printableH - conf.actualHmm)/2;
            doc.addImage(imgData, 'PNG', x, y, conf.actualWmm, conf.actualHmm);
            doc.save('instantgeometry.pdf');
          }, true);
        }catch(err){
          setStatus(err.message, 'error');
        }
      }

      function bindAutoRedraw(root){
        root.addEventListener('input', function(){
          updatePrintMeta();
        });
        root.addEventListener('change', function(){
          updatePrintMeta();
        });
      }

      document.getElementById('drawBtn').addEventListener('click', draw);
      document.getElementById('resetBtn').addEventListener('click', resetAll);
      document.getElementById('savePngBtn').addEventListener('click', savePng);
      document.getElementById('saveJpegBtn').addEventListener('click', saveJpeg);
      document.getElementById('savePdfBtn').addEventListener('click', savePdf);
      document.getElementById('previewBtn').addEventListener('click', function(){ openPrintPreview(false); });
      document.getElementById('printBtn').addEventListener('click', function(){ openPrintPreview(true); });

      shapeTypeEl.addEventListener('change', function(){
        updateControlsVisibility();
        draw();
      });

      triangleModeEl.addEventListener('change', function(){
        rebuildTriangleFields();
        draw();
      });

      bindAutoRedraw(document.body);

      rebuildTriangleFields();
      rebuildQuadrilateralFields();
      rebuildPolygonFields();
      rebuildCircleFields();
      rebuildEllipseFields();
      updateControlsVisibility();
      updatePrintMeta();
      draw();
    })();
  </script>
</body>
</html>
