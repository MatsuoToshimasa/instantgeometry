<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Geometry</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    #box {
      width: 800px;
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 16px;
      background: white;
      position: relative;
      touch-action: none;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    input[type="number"] {
      width: 80px;
      padding: 6px;
    }

    input[type="range"] {
      width: 140px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    label {
      user-select: none;
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .range-value {
      min-width: 2em;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Instant Geometry</h1>
  <div>3辺を入れると三角形を描く簡易版</div>

  <div class="controls">
    <label>a <input id="a" type="number" value="3" step="0.1" min="0.1" /></label>
    <label>b <input id="b" type="number" value="4" step="0.1" min="0.1" /></label>
    <label>c <input id="c" type="number" value="5" step="0.1" min="0.1" /></label>

    <label>
      <input id="showAxes" type="checkbox" checked />
      座標軸を表示
    </label>

    <label>
      <input id="showCoordLabels" type="checkbox" checked />
      座標ラベルを表示
    </label>

    <label>
      <input id="showSideLabels" type="checkbox" checked />
      辺の長さを表示
    </label>

    <div class="range-wrap">
      <label for="labelSize">点ラベル</label>
      <input id="labelSize" type="range" min="10" max="32" step="1" value="18" />
      <span id="labelSizeValue" class="range-value">18</span>
    </div>

    <button onclick="saveImage()">保存</button>
  </div>

  <div id="box" class="jxgbox"></div>

  <script>
    let board = null;

    function getInputValues() {
      return {
        a: parseFloat(document.getElementById('a').value),
        b: parseFloat(document.getElementById('b').value),
        c: parseFloat(document.getElementById('c').value),
        showAxes: document.getElementById('showAxes').checked,
        showCoordLabels: document.getElementById('showCoordLabels').checked,
        showSideLabels: document.getElementById('showSideLabels').checked,
        labelSize: parseInt(document.getElementById('labelSize').value, 10)
      };
    }

    function updateSliderLabel() {
      document.getElementById('labelSizeValue').textContent =
        document.getElementById('labelSize').value;
    }

    function isValidTriangle(a, b, c) {
      if (!(a > 0 && b > 0 && c > 0)) return false;
      if (a + b <= c || a + c <= b || b + c <= a) return false;
      return true;
    }

    function computeTriangle(a, b, c) {
      const A = { x: 0, y: 0 };
      const B = { x: c, y: 0 };
      const Cx = (b * b + c * c - a * a) / (2 * c);
      const Cy2 = b * b - Cx * Cx;
      if (Cy2 < 0) return null;
      const C = { x: Cx, y: Math.sqrt(Cy2) };
      return { A, B, C };
    }

    function makeSquareBoundingBox(points) {
      const xs = [points.A.x, points.B.x, points.C.x];
      const ys = [points.A.y, points.B.y, points.C.y];

      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);

      const width = Math.max(maxX - minX, 1);
      const height = Math.max(maxY - minY, 1);
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      const side = Math.max(width, height) * 2.4;

      return [
        centerX - side / 2,
        centerY + side / 2,
        centerX + side / 2,
        centerY - side / 2
      ];
    }

    function clearBoard() {
      if (board) {
        JXG.JSXGraph.freeBoard(board);
        board = null;
      }
      document.getElementById('box').innerHTML = '';
    }

    function createAxes(showAxes) {
      if (!showAxes) return;

      board.create('axis', [[0, 0], [1, 0]], {
        withLabel: false,
        strokeWidth: 1,
        ticks: {
          drawLabels: true,
          insertTicks: true,
          ticksDistance: 1,
          minorTicks: 0,
          label: {
            offset: [0, -12]
          }
        }
      });

      board.create('axis', [[0, 0], [0, 1]], {
        withLabel: false,
        strokeWidth: 1,
        ticks: {
          drawLabels: true,
          insertTicks: true,
          ticksDistance: 1,
          minorTicks: 0,
          label: {
            offset: [-12, 0]
          }
        }
      });
    }

    function formatNumber(x) {
      const rounded = Math.round(x * 100) / 100;
      if (Math.abs(rounded - Math.round(rounded)) < 1e-9) {
        return String(Math.round(rounded));
      }
      return rounded.toFixed(2);
    }

    function centroid(points) {
      return {
        x: (points.A.x + points.B.x + points.C.x) / 3,
        y: (points.A.y + points.B.y + points.C.y) / 3
      };
    }

    function unitVector(from, to) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const len = Math.hypot(dx, dy) || 1;
      return { x: dx / len, y: dy / len };
    }

    function unitNormalOutside(P, Q, ctr) {
      const dx = Q.x - P.x;
      const dy = Q.y - P.y;
      const len = Math.hypot(dx, dy) || 1;

      let nx = -dy / len;
      let ny = dx / len;

      const mid = { x: (P.x + Q.x) / 2, y: (P.y + Q.y) / 2 };
      const toCtr = { x: ctr.x - mid.x, y: ctr.y - mid.y };

      if (nx * toCtr.x + ny * toCtr.y > 0) {
        nx = -nx;
        ny = -ny;
      }

      return { x: nx, y: ny };
    }

    function quadraticPoint(p1, control, p2, t) {
      return {
        x: (1 - t) * (1 - t) * p1.x + 2 * (1 - t) * t * control.x + t * t * p2.x,
        y: (1 - t) * (1 - t) * p1.y + 2 * (1 - t) * t * control.y + t * t * p2.y
      };
    }

    function addPointLabelText(vertex, ctr, name, labelSize, showCoordLabels) {
      const outward = unitVector(ctr, vertex);
      const labelDistance = 0.5;

      const pos = {
        x: vertex.x + outward.x * labelDistance,
        y: vertex.y + outward.y * labelDistance
      };

      const text = showCoordLabels
        ? `${name}(${formatNumber(vertex.x)}, ${formatNumber(vertex.y)})`
        : name;

      board.create('text', [pos.x, pos.y, text], {
        fontSize: labelSize,
        fixed: true,
        anchorX: 'middle',
        anchorY: 'middle'
      });
    }

    function addSideArcAndLabel(P, Q, lengthText, ctr, labelSize) {
      const mid = { x: (P.x + Q.x) / 2, y: (P.y + Q.y) / 2 };
      const dx = Q.x - P.x;
      const dy = Q.y - P.y;
      const len = Math.hypot(dx, dy) || 1;
      const n = unitNormalOutside(P, Q, ctr);

      const arcHeight = Math.max(0.35, len * 0.12);
      const endInset = Math.min(0.22, len * 0.10);

      const p1 = {
        x: P.x + (dx / len) * endInset,
        y: P.y + (dy / len) * endInset
      };

      const p2 = {
        x: Q.x - (dx / len) * endInset,
        y: Q.y - (dy / len) * endInset
      };

      const control = {
        x: mid.x + n.x * arcHeight,
        y: mid.y + n.y * arcHeight
      };

      const gapHalf = 0.14;

      board.create('curve', [
        function(t) {
          return quadraticPoint(p1, control, p2, t).x;
        },
        function(t) {
          return quadraticPoint(p1, control, p2, t).y;
        },
        0, 0.5 - gapHalf
      ], {
        strokeWidth: 2,
        dash: 2,
        fixed: true
      });

      board.create('curve', [
        function(t) {
          return quadraticPoint(p1, control, p2, t).x;
        },
        function(t) {
          return quadraticPoint(p1, control, p2, t).y;
        },
        0.5 + gapHalf, 1
      ], {
        strokeWidth: 2,
        dash: 2,
        fixed: true
      });

      const centerPoint = quadraticPoint(p1, control, p2, 0.5);

      board.create('text', [
        centerPoint.x,
        centerPoint.y,
        lengthText
      ], {
        fontSize: labelSize,
        fixed: true,
        anchorX: 'middle',
        anchorY: 'middle',
        cssStyle: 'background: white; padding: 0 4px;'
      });
    }

    function renderTriangle(values) {
      const { a, b, c, showAxes, showCoordLabels, showSideLabels, labelSize } = values;
      if (!isValidTriangle(a, b, c)) return;

      const points = computeTriangle(a, b, c);
      if (!points) return;

      clearBoard();

      board = JXG.JSXGraph.initBoard('box', {
        boundingbox: makeSquareBoundingBox(points),
        axis: false,
        keepaspectratio: true,
        zoom: {
          wheel: true,
          needShift: false
        },
        pan: {
          enabled: true,
          needTwoFingers: true
        },
        showNavigation: false,
        showCopyright: false
      });

      createAxes(showAxes);

      const A = board.create('point', [points.A.x, points.A.y], {
        name: '',
        size: 3,
        fixed: true,
        withLabel: false
      });

      const B = board.create('point', [points.B.x, points.B.y], {
        name: '',
        size: 3,
        fixed: true,
        withLabel: false
      });

      const C = board.create('point', [points.C.x, points.C.y], {
        name: '',
        size: 3,
        fixed: true,
        withLabel: false
      });

      board.create('polygon', [A, B, C], {
        borders: {
          strokeWidth: 2
        },
        fillColor: 'lightgray',
        fillOpacity: 0.15
      });

      const ctr = centroid(points);

      addPointLabelText(points.A, ctr, 'A', labelSize, showCoordLabels);
      addPointLabelText(points.B, ctr, 'B', labelSize, showCoordLabels);
      addPointLabelText(points.C, ctr, 'C', labelSize, showCoordLabels);

      if (showSideLabels) {
        addSideArcAndLabel(points.B, points.C, formatNumber(a), ctr, labelSize);
        addSideArcAndLabel(points.A, points.C, formatNumber(b), ctr, labelSize);
        addSideArcAndLabel(points.A, points.B, formatNumber(c), ctr, labelSize);
      }

      board.update();
    }

    function autoRender() {
      updateSliderLabel();
      const values = getInputValues();
      if (isValidTriangle(values.a, values.b, values.c)) {
        renderTriangle(values);
      }
    }

    async function saveImage() {
      const box = document.getElementById('box');

      try {
        const canvas = await html2canvas(box, {
          backgroundColor: '#ffffff',
          useCORS: true,
          scale: 2
        });

        const link = document.createElement('a');
        link.download = 'geometry.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        console.error(error);
        alert('画像保存に失敗しました');
      }
    }

    function setupAutoRender() {
      const ids = [
        'a',
        'b',
        'c',
        'showAxes',
        'showCoordLabels',
        'showSideLabels',
        'labelSize'
      ];

      ids.forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener('input', autoRender);
        el.addEventListener('change', autoRender);
      });
    }

    updateSliderLabel();
    setupAutoRender();
    autoRender();
  </script>
</body>
</html>
