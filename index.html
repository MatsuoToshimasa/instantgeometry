<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Geometry</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    #box {
      width: 800px;
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 16px;
      background: white;
      position: relative;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    input[type="number"] {
      width: 80px;
      padding: 6px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    label {
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>Instant Geometry</h1>
  <div>3辺を入れると三角形を描く簡易版</div>

  <div class="controls">
    <label>a <input id="a" type="number" value="3" step="0.1" /></label>
    <label>b <input id="b" type="number" value="4" step="0.1" /></label>
    <label>c <input id="c" type="number" value="5" step="0.1" /></label>

    <label>
      <input id="showAxes" type="checkbox" checked />
      座標軸を表示
    </label>

    <label>
      <input id="showPointCoords" type="checkbox" checked />
      点の座標を表示
    </label>

    <button onclick="drawTriangle()">描画</button>
    <button onclick="saveTriangleOnly()">三角形だけ保存</button>
  </div>

  <div id="box" class="jxgbox"></div>

  <script>
    let board;
    let currentData = null;

    function getInputValues() {
      const a = parseFloat(document.getElementById('a').value);
      const b = parseFloat(document.getElementById('b').value);
      const c = parseFloat(document.getElementById('c').value);
      const showAxes = document.getElementById('showAxes').checked;
      const showPointCoords = document.getElementById('showPointCoords').checked;

      return { a, b, c, showAxes, showPointCoords };
    }

    function validateTriangle(a, b, c) {
      if (!(a > 0 && b > 0 && c > 0)) {
        alert('正の数を入れてください');
        return false;
      }

      if (a + b <= c || a + c <= b || b + c <= a) {
        alert('三角形になりません');
        return false;
      }

      return true;
    }

    function computeTriangle(a, b, c) {
      const Ax = 0;
      const Ay = 0;
      const Bx = c;
      const By = 0;
      const Cx = (b * b + c * c - a * a) / (2 * c);
      const Cy2 = b * b - Cx * Cx;

      if (Cy2 < 0) {
        return null;
      }

      const Cy = Math.sqrt(Cy2);

      return {
        A: { x: Ax, y: Ay },
        B: { x: Bx, y: By },
        C: { x: Cx, y: Cy }
      };
    }

    function makeBoundingBox(points) {
      const xs = [points.A.x, points.B.x, points.C.x];
      const ys = [points.A.y, points.B.y, points.C.y];

      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);

      const width = maxX - minX || 1;
      const height = maxY - minY || 1;

      const margin = Math.max(width, height) * 0.25 + 0.5;

      return [
        minX - margin,
        maxY + margin,
        maxX + margin,
        minY - margin
      ];
    }

    function pointText(name, x, y, showPointCoords) {
      if (showPointCoords) {
        return `${name}(${x.toFixed(2)}, ${y.toFixed(2)})`;
      }
      return name;
    }

    function freeCurrentBoard() {
      if (board) {
        JXG.JSXGraph.freeBoard(board);
        board = null;
      }
      document.getElementById('box').innerHTML = '';
    }

    function createBoard(points, showAxes) {
      const bbox = makeBoundingBox(points);

      board = JXG.JSXGraph.initBoard('box', {
        boundingbox: bbox,
        axis: false,
        keepaspectratio: true,
        showNavigation: false,
        showCopyright: false
      });

      if (showAxes) {
        const xAxis = board.create('axis', [[0, 0], [1, 0]], {
          withLabel: false,
          ticks: {
            drawLabels: false,
            minorTicks: 0
          }
        });

        const yAxis = board.create('axis', [[0, 0], [0, 1]], {
          withLabel: false,
          ticks: {
            drawLabels: false,
            minorTicks: 0
          }
        });
      }
    }

    function drawTriangle() {
      const { a, b, c, showAxes, showPointCoords } = getInputValues();

      if (!validateTriangle(a, b, c)) {
        return;
      }

      const points = computeTriangle(a, b, c);

      if (!points) {
        alert('三角形を描画できません');
        return;
      }

      currentData = { a, b, c, showAxes, showPointCoords, points };

      freeCurrentBoard();
      createBoard(points, showAxes);

      const A = board.create('point', [points.A.x, points.A.y], {
        name: pointText('A', points.A.x, points.A.y, showPointCoords),
        size: 3,
        fixed: true,
        withLabel: true
      });

      const B = board.create('point', [points.B.x, points.B.y], {
        name: pointText('B', points.B.x, points.B.y, showPointCoords),
        size: 3,
        fixed: true,
        withLabel: true
      });

      const C = board.create('point', [points.C.x, points.C.y], {
        name: pointText('C', points.C.x, points.C.y, showPointCoords),
        size: 3,
        fixed: true,
        withLabel: true
      });

      board.create('polygon', [A, B, C], {
        borders: {
          strokeWidth: 2
        },
        fillColor: 'lightgray',
        fillOpacity: 0.2
      });

      board.update();
    }

    async function saveTriangleOnly() {
      const { a, b, c } = getInputValues();

      if (!validateTriangle(a, b, c)) {
        return;
      }

      const points = computeTriangle(a, b, c);
      if (!points) {
        alert('三角形を描画できません');
        return;
      }

      const oldData = currentData ? { ...currentData } : null;

      freeCurrentBoard();
      createBoard(points, false);

      const A = board.create('point', [points.A.x, points.A.y], {
        name: '',
        size: 3,
        fixed: true,
        withLabel: false
      });

      const B = board.create('point', [points.B.x, points.B.y], {
        name: '',
        size: 3,
        fixed: true,
        withLabel: false
      });

      const C = board.create('point', [points.C.x, points.C.y], {
        name: '',
        size: 3,
        fixed: true,
        withLabel: false
      });

      board.create('polygon', [A, B, C], {
        borders: {
          strokeWidth: 2
        },
        fillColor: 'lightgray',
        fillOpacity: 0.2
      });

      board.update();

      const box = document.getElementById('box');

      try {
        const canvas = await html2canvas(box, {
          backgroundColor: null,
          useCORS: true,
          scale: 2
        });

        const trimmed = trimCanvas(canvas);
        const link = document.createElement('a');
        link.download = 'triangle.png';
        link.href = trimmed.toDataURL('image/png');
        link.click();
      } catch (error) {
        console.error(error);
        alert('画像保存に失敗しました');
      }

      if (oldData) {
        document.getElementById('showAxes').checked = oldData.showAxes;
        document.getElementById('showPointCoords').checked = oldData.showPointCoords;
      }

      drawTriangle();
    }

    function trimCanvas(sourceCanvas) {
      const ctx = sourceCanvas.getContext('2d');
      const { width, height } = sourceCanvas;
      const imageData = ctx.getImageData(0, 0, width, height).data;

      let top = height;
      let left = width;
      let right = 0;
      let bottom = 0;
      let found = false;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const index = (y * width + x) * 4;
          const alpha = imageData[index + 3];

          if (alpha > 0) {
            found = true;
            if (x < left) left = x;
            if (x > right) right = x;
            if (y < top) top = y;
            if (y > bottom) bottom = y;
          }
        }
      }

      if (!found) {
        return sourceCanvas;
      }

      const padding = 10;
      left = Math.max(0, left - padding);
      top = Math.max(0, top - padding);
      right = Math.min(width - 1, right + padding);
      bottom = Math.min(height - 1, bottom + padding);

      const trimmedWidth = right - left + 1;
      const trimmedHeight = bottom - top + 1;

      const trimmedCanvas = document.createElement('canvas');
      trimmedCanvas.width = trimmedWidth;
      trimmedCanvas.height = trimmedHeight;

      const trimmedCtx = trimmedCanvas.getContext('2d');
      trimmedCtx.drawImage(
        sourceCanvas,
        left, top, trimmedWidth, trimmedHeight,
        0, 0, trimmedWidth, trimmedHeight
      );

      return trimmedCanvas;
    }

    drawTriangle();
  </script>
</body>
</html>
