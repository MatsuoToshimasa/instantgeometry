<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proにする</title>
  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      margin:0;
      background:#f6f7fb;
      color:#1f2430;
    }
    .wrap{
      max-width:760px;
      margin:40px auto;
      padding:24px;
    }
    .card{
      background:#fff;
      border:1px solid #d9dce7;
      border-radius:16px;
      padding:24px;
      box-shadow:0 4px 20px rgba(0,0,0,.04);
    }
    h1{margin:0 0 12px}
    p{line-height:1.7}
    ul{line-height:1.8}
    .price{
      font-size:28px;
      font-weight:700;
      margin:16px 0;
    }
    .buttons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:20px;
    }
    button,a.btn{
      display:inline-block;
      text-decoration:none;
      border:1px solid #2a5bd7;
      background:#2a5bd7;
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      font-size:15px;
      cursor:pointer;
    }
    a.btn.secondary{
      background:#fff;
      color:#2a5bd7;
    }
    .note{
      color:#687086;
      font-size:14px;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>InstantGeometry Pro</h1>
      <p>無料版は1日3回までです。Proにすると、保存・PDF出力が無制限になります。</p>

      <div class="price" id="priceBox">読み込み中...</div>

      <ul>
        <li>図形保存が無制限</li>
        <li>問題PDF出力が無制限</li>
        <li>今後の追加機能も利用可能</li>
      </ul>

      <div class="buttons">
        <button id="proButton">Proにする</button>
        <a class="btn secondary" href="/">戻る</a>
      </div>

      <div class="note">現在はボタンの見た目のみです。次にStripeと接続します。</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/supabase-client.js"></script>

<script>
  async function loadPricing() {
    try {
      const res = await fetch('/api/get-pricing');
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('priceBox').textContent = '料金の取得に失敗しました';
        return;
      }

      document.getElementById('priceBox').textContent =
        '月額 ' + data.amount + '円';
    } catch (e) {
      document.getElementById('priceBox').textContent = '料金の取得に失敗しました';
    }
  }

  document.getElementById('proButton').onclick = async () => {
    try {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data.session) {
        location.href = '/login/';
        return;
      }

      const userId = data.session.user.id;

      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId })
      });

      const json = await res.json();

      if (!res.ok) {
        alert(json.error || '決済ページの作成に失敗しました');
        return;
      }

      location.href = json.url;
    } catch (e) {
      alert(e.message);
    }
  };

  loadPricing();
</script>
</body>
</html>
